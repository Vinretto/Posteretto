  <style>
    /* Live list markers while editing. The counter scope restarts at any
       non-list block, so a list that follows a paragraph begins at 1 again. */
    .rich-editor > div:not([data-list]) { counter-reset: li; }
    .rich-editor > div[data-list] {
      display: flex; gap: 0.45em; align-items: baseline;
    }
    .rich-editor > div[data-list]::before {
      flex-shrink: 0; font-weight: 600; opacity: 0.95;
      min-width: 0.9em;
    }
    .rich-editor > div[data-list="disc"]::before   { content: "\2022"; }
    .rich-editor > div[data-list="dash"]::before   { content: "\2013"; }
    .rich-editor > div[data-list="circle"]::before { content: "\25E6"; }
    .rich-editor > div[data-list="square"]::before { content: "\25AA"; }
    .rich-editor > div[data-list="decimal"],
    .rich-editor > div[data-list="paren"],
    .rich-editor > div[data-list="lower-alpha"],
    .rich-editor > div[data-list="upper-roman"] { counter-increment: li; }
    .rich-editor > div[data-list="decimal"]::before     { content: counter(li) "."; min-width: 1.5em; }
    .rich-editor > div[data-list="paren"]::before       { content: counter(li) ")"; min-width: 1.5em; }
    .rich-editor > div[data-list="lower-alpha"]::before { content: counter(li, lower-alpha) "."; min-width: 1.5em; }
    .rich-editor > div[data-list="upper-roman"]::before { content: counter(li, upper-roman) "."; min-width: 1.8em; }
    .rich-editor > div[data-list] > * { flex: 1; }
    .rich-editor:focus { outline-offset: 0; }
  </style>

    const HEADER_STYLES = [

      { key: 'tab',       label: 'Tab above' },

    /* ---- Shape library ------------------------------------------------------
       Every shape resolves to a single SVG path string so the on-canvas renderer
       and the export serialiser share one source of truth. `r` is the corner
       radius in mm (0 = hard square corners).                                */
    function shapePath(shape, w, h, r = 0) {
      const W = Math.max(1, w), H = Math.max(1, h);
      const cr = clamp(r, 0, Math.min(W, H) / 2);
      const poly = (pts) => 'M ' + pts.map(([x, y]) => `${+(x * W).toFixed(3)} ${+(y * H).toFixed(3)}`).join(' L ') + ' Z';
      const starPts = (n, inner) => {
        const out = [];
        for (let i = 0; i < n * 2; i++) {
          const rad = i % 2 === 0 ? 0.5 : inner * 0.5;
          const a = (Math.PI * i) / n - Math.PI / 2;
          out.push([0.5 + Math.cos(a) * rad, 0.5 + Math.sin(a) * rad]);
        }
        return poly(out);
      };
      const ngon = (n, rot = -Math.PI / 2) => {
        const out = [];
        for (let i = 0; i < n; i++) {
          const a = (2 * Math.PI * i) / n + rot;
          out.push([0.5 + Math.cos(a) * 0.5, 0.5 + Math.sin(a) * 0.5]);
        }
        return poly(out);
      };
      switch (shape) {
        case 'rect':
          if (cr <= 0) return `M 0 0 L ${W} 0 L ${W} ${H} L 0 ${H} Z`;
          return `M ${cr} 0 L ${W - cr} 0 A ${cr} ${cr} 0 0 1 ${W} ${cr} L ${W} ${H - cr} A ${cr} ${cr} 0 0 1 ${W - cr} ${H} L ${cr} ${H} A ${cr} ${cr} 0 0 1 0 ${H - cr} L 0 ${cr} A ${cr} ${cr} 0 0 1 ${cr} 0 Z`;
        case 'ellipse':
          return `M 0 ${H / 2} A ${W / 2} ${H / 2} 0 1 0 ${W} ${H / 2} A ${W / 2} ${H / 2} 0 1 0 0 ${H / 2} Z`;
        case 'triangle':      return poly([[0.5, 0], [1, 1], [0, 1]]);
        case 'triangle-down': return poly([[0, 0], [1, 0], [0.5, 1]]);
        case 'right-tri':     return poly([[0, 0], [1, 1], [0, 1]]);
        case 'diamond':       return poly([[0.5, 0], [1, 0.5], [0.5, 1], [0, 0.5]]);
        case 'pentagon':      return ngon(5);
        case 'hexagon':       return ngon(6, 0);
        case 'hexagon-v':     return ngon(6, -Math.PI / 2);
        case 'octagon':       return ngon(8, -Math.PI / 8);
        case 'star5':         return starPts(5, 0.42);
        case 'star6':         return starPts(6, 0.55);
        case 'burst':         return starPts(12, 0.72);
        case 'parallelogram': return poly([[0.22, 0], [1, 0], [0.78, 1], [0, 1]]);
        case 'trapezoid':     return poly([[0.22, 0], [0.78, 0], [1, 1], [0, 1]]);
        case 'chevron':       return poly([[0, 0], [0.72, 0], [1, 0.5], [0.72, 1], [0, 1], [0.28, 0.5]]);
        case 'arrow-right':   return poly([[0, 0.28], [0.62, 0.28], [0.62, 0], [1, 0.5], [0.62, 1], [0.62, 0.72], [0, 0.72]]);
        case 'arrow-left':    return poly([[1, 0.28], [0.38, 0.28], [0.38, 0], [0, 0.5], [0.38, 1], [0.38, 0.72], [1, 0.72]]);
        case 'arrow-up':      return poly([[0.28, 1], [0.28, 0.38], [0, 0.38], [0.5, 0], [1, 0.38], [0.72, 0.38], [0.72, 1]]);
        case 'arrow-down':    return poly([[0.28, 0], [0.28, 0.62], [0, 0.62], [0.5, 1], [1, 0.62], [0.72, 0.62], [0.72, 0]]);
        case 'arrow-both':    return poly([[0, 0.5], [0.22, 0.12], [0.22, 0.32], [0.78, 0.32], [0.78, 0.12], [1, 0.5], [0.78, 0.88], [0.78, 0.68], [0.22, 0.68], [0.22, 0.88]]);
        case 'cross':         return poly([[0.34, 0], [0.66, 0], [0.66, 0.34], [1, 0.34], [1, 0.66], [0.66, 0.66], [0.66, 1], [0.34, 1], [0.34, 0.66], [0, 0.66], [0, 0.34], [0.34, 0.34]]);
        case 'tag':           return poly([[0, 0], [0.78, 0], [1, 0.5], [0.78, 1], [0, 1]]);
        case 'cylinder': {
          const e = H * 0.14;
          return `M 0 ${e} A ${W / 2} ${e} 0 0 1 ${W} ${e} L ${W} ${H - e} A ${W / 2} ${e} 0 0 1 0 ${H - e} Z`;
        }
        case 'speech': {
          const bh = H * 0.78, rr = Math.min(W, bh) * 0.12;
          return `M ${rr} 0 L ${W - rr} 0 A ${rr} ${rr} 0 0 1 ${W} ${rr} L ${W} ${bh - rr} A ${rr} ${rr} 0 0 1 ${W - rr} ${bh} L ${W * 0.34} ${bh} L ${W * 0.2} ${H} L ${W * 0.22} ${bh} L ${rr} ${bh} A ${rr} ${rr} 0 0 1 0 ${bh - rr} L 0 ${rr} A ${rr} ${rr} 0 0 1 ${rr} 0 Z`;
        }
        case 'ribbon':        return poly([[0, 0], [1, 0], [1, 1], [0.5, 0.78], [0, 1]]);
        case 'bracket':       return `M ${W * 0.25} 0 L 0 0 L 0 ${H} L ${W * 0.25} ${H}`;
        default:              return `M 0 0 L ${W} 0 L ${W} ${H} L 0 ${H} Z`;
      }
    }
    /* Shapes drawn as an open stroke (no fill) — brackets, lines. */
    const OPEN_SHAPES = new Set(['bracket']);

      { key: 'right-tri',     group: 'Basic',   label: 'Right tri.',   w: 150, h: 130 },
      { key: 'diamond',       group: 'Basic',   label: 'Diamond',      w: 150, h: 150 },
      { key: 'pentagon',      group: 'Polygon', label: 'Pentagon',     w: 150, h: 150 },
      { key: 'hexagon',       group: 'Polygon', label: 'Hexagon',      w: 160, h: 140 },
      { key: 'hexagon-v',     group: 'Polygon', label: 'Hexagon ▮',    w: 140, h: 160 },

      { key: 'tag',           group: 'Flow',    label: 'Tag',          w: 180, h: 100 },

      { key: 'cylinder',      group: 'Flow',    label: 'Cylinder',     w: 140, h: 170 },
      { key: 'cross',         group: 'Flow',    label: 'Cross',        w: 140, h: 140 },
      { key: 'speech',        group: 'Flow',    label: 'Speech',       w: 180, h: 140 },
      { key: 'ribbon',        group: 'Flow',    label: 'Ribbon',       w: 170, h: 120 },
      { key: 'bracket',       group: 'Flow',    label: 'Bracket',      w: 60,  h: 180 },
    ];

    const ARROW_VARIANTS = [
      { key: 'arrow',  label: 'Arrow',        startHead: 'none',     endHead: 'triangle', routing: 'straight', dashed: false, icon: ArrowRight },
      { key: 'double', label: 'Double arrow', startHead: 'triangle', endHead: 'triangle', routing: 'straight', dashed: false, icon: ArrowLeftRight },
      { key: 'open',   label: 'Open head',    startHead: 'none',     endHead: 'open',     routing: 'straight', dashed: false, icon: MoveRight },
      { key: 'line',   label: 'Plain line',   startHead: 'none',     endHead: 'none',     routing: 'straight', dashed: false, icon: Minus },
      { key: 'dashed', label: 'Dashed arrow', startHead: 'none',     endHead: 'triangle', routing: 'straight', dashed: true,  icon: Redo2 },
      { key: 'elbow',  label: 'Elbow arrow',  startHead: 'none',     endHead: 'triangle', routing: 'elbow',    dashed: false, icon: CornerDownRight },
      { key: 'curved', label: 'Curved arrow', startHead: 'none',     endHead: 'triangle', routing: 'curved',   dashed: false, icon: Spline },
      { key: 'dot',    label: 'Dot → arrow',  startHead: 'dot',      endHead: 'triangle', routing: 'straight', dashed: false, icon: Waypoints },
    ];
    const variantByKey = Object.fromEntries(ARROW_VARIANTS.map((v) => [v.key, v]));

    let ID = 1;
    const uid = () => `el_${Date.now()}_${ID++}`;
    const LOREM = 'Concise, information-dense summary text goes here. Double-click to edit.';

    /* ------------------------------ Geometry ---------------------------------- */
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const round = (v) => Math.round(v);
    const centerOf = (el) => ({ x: el.x + el.w / 2, y: el.y + el.h / 2 });
    const isBox = (el) => el.type !== 'connector'; 
    const isStitchable = (el) => ['section', 'text', 'image', 'shape'].includes(el.type);

    function anchorPoint(el, anchor, toward) {
      const cx = el.x + el.w / 2, cy = el.y + el.h / 2;
      if (anchor === 'center') return { x: cx, y: cy };
      if (anchor === 'top')    return { x: cx, y: el.y };
      if (anchor === 'bottom') return { x: cx, y: el.y + el.h };
      if (anchor === 'left')   return { x: el.x, y: cy };
      if (anchor === 'right')  return { x: el.x + el.w, y: cy };
      let dx = toward.x - cx, dy = toward.y - cy;
      if (dx === 0 && dy === 0) return { x: cx, y: el.y };
      const hw = el.w / 2, hh = el.h / 2;
      const s = 1 / Math.max(Math.abs(dx) / hw, Math.abs(dy) / hh);
      return { x: cx + dx * s, y: cy + dy * s };
    }

    function resolveConnector(c, byId) {
      const startEl = c.start.elId != null ? byId[c.start.elId] : null;
      const endEl   = c.end.elId   != null ? byId[c.end.elId]   : null;
      const startRaw = startEl ? centerOf(startEl) : { x: c.start.x, y: c.start.y };
      const endRaw   = endEl   ? centerOf(endEl)   : { x: c.end.x,   y: c.end.y };
      const A = startEl ? anchorPoint(startEl, c.start.anchor, endRaw) : { x: c.start.x, y: c.start.y };
      const B = endEl   ? anchorPoint(endEl,   c.end.anchor,   startRaw) : { x: c.end.x, y: c.end.y };
      return { A, B };
    }

    function elementAt(px, py, elements, excludeId) {
      for (let i = elements.length - 1; i >= 0; i--) {
        const el = elements[i];
        if (!isStitchable(el) || el.id === excludeId) continue;
        if (px >= el.x && px <= el.x + el.w && py >= el.y && py <= el.y + el.h) return el;
      }
      return null;
    }

    /* ----------------------------- Snap Logic --------------------------------- */
    function computeSnap(box, others, poster, zoom) {
      const th = SNAP_SCREEN_PX / zoom;
      const linesOf = (axis) => {
        const o = axis === 'x' ? box.x : box.y, s = axis === 'x' ? box.w : box.h;
        return [{ pos: o, offset: 0 }, { pos: o + s / 2, offset: s / 2 }, { pos: o + s, offset: s }];
      };
      const targetsFor = (axis) => {
        const span = axis === 'x' ? poster.w : poster.h;
        const t = [{ pos: 0 }, { pos: span / 2 }, { pos: span }];
        for (const el of others) {
          const o = axis === 'x' ? el.x : el.y, s = axis === 'x' ? el.w : el.h;
          t.push({ pos: o, el }, { pos: o + s / 2, el }, { pos: o + s, el });
        }
        return t;
      };
      const alignAxis = (axis) => {
        let best = null;
        for (const ml of linesOf(axis)) for (const tg of targetsFor(axis)) {
          const dist = Math.abs(tg.pos - ml.pos);
          if (dist <= th && (best === null || dist < best.dist))
            best = { dist, coord: tg.pos - ml.offset, targetPos: tg.pos, targetEl: tg.el || null };
        }
        if (!best) return null;
        const snapped = { ...box, [axis]: best.coord };
        let start, end;
        if (best.targetEl) {
          const a = axis === 'x' ? [snapped.y, snapped.y + snapped.h] : [snapped.x, snapped.x + snapped.w];
          const b = axis === 'x' ? [best.targetEl.y, best.targetEl.y + best.targetEl.h]
                                 : [best.targetEl.x, best.targetEl.x + best.targetEl.w];
          start = Math.min(a[0], b[0]); end = Math.max(a[1], b[1]);
        } else { start = 0; end = axis === 'x' ? poster.h : poster.w; }
        return { coord: best.coord, guide: { type: 'align', axis, pos: best.targetPos, start, end } };
      };

      const guides = [];
      let X = null, Y = null;
      const ax = alignAxis('x'); if (ax) { X = ax.coord; guides.push(ax.guide); }
      const ay = alignAxis('y'); if (ay) { Y = ay.coord; guides.push(ay.guide); }
      return { x: X === null ? box.x : X, y: Y === null ? box.y : Y, guides };
    }

    function computeResizeSnap(box, handle, others, poster, zoom) {
      const th = SNAP_SCREEN_PX / zoom;
      let { x, y, w, h } = box;
      let xSnap = null, ySnap = null; 

      if (handle.includes('e') || handle.includes('w')) {
        const movesE = handle.includes('e');
        const movingPos = movesE ? x + w : x;
        const fixed = movesE ? x : x + w;
        const targets = [];
        const align = (pos) => targets.push({ pos, kind: 'align' });
        align(0); align(poster.w / 2); align(poster.w);
        for (const o of others) { align(o.x); align(o.x + o.w / 2); align(o.x + o.w); }
        for (const o of others) targets.push({ pos: movesE ? fixed + o.w : fixed - o.w, kind: 'equalW', el: o, value: o.w });
        let best = null;
        for (const tg of targets) { const d = Math.abs(tg.pos - movingPos); if (d <= th && (!best || d < best.d)) best = { d, tg }; }
        if (best) {
          const np = best.tg.pos;
          if (movesE) w = Math.max(MIN_SIZE_MM, np - x);
          else { const nx = Math.min(np, x + w - MIN_SIZE_MM); w = x + w - nx; x = nx; }
          xSnap = best.tg;
        }
      }
      if (handle.includes('s') || handle.includes('n')) {
        const movesS = handle.includes('s');
        const movingPos = movesS ? y + h : y;
        const fixed = movesS ? y : y + h;
        const targets = [];
        const align = (pos) => targets.push({ pos, kind: 'align' });
        align(0); align(poster.h / 2); align(poster.h);
        for (const o of others) { align(o.y); align(o.y + o.h / 2); align(o.y + o.h); }
        for (const o of others) targets.push({ pos: movesS ? fixed + o.h : fixed - o.h, kind: 'equalH', el: o, value: o.h });
        let best = null;
        for (const tg of targets) { const d = Math.abs(tg.pos - movingPos); if (d <= th && (!best || d < best.d)) best = { d, tg }; }
        if (best) {
          const np = best.tg.pos;
          if (movesS) h = Math.max(MIN_SIZE_MM, np - y);
          else { const ny = Math.min(np, y + h - MIN_SIZE_MM); h = y + h - ny; y = ny; }
          ySnap = best.tg;
        }
      }

      const guides = [];
      const finalBox = { x, y, w, h };
      if (xSnap) guides.push(xSnap.kind === 'align'
        ? { type: 'align', axis: 'x', pos: xSnap.pos, start: 0, end: poster.h }
        : { type: 'equalW', a: finalBox, b: xSnap.el, value: xSnap.value });
      if (ySnap) guides.push(ySnap.kind === 'align'
        ? { type: 'align', axis: 'y', pos: ySnap.pos, start: 0, end: poster.w }
        : { type: 'equalH', a: finalBox, b: ySnap.el, value: ySnap.value });

      return { x, y, w, h, guides };
    }

    /* ============================================================================
       SHADOWS
       ========================================================================== */
    const SHADOW_LEVELS = [
      { key: 'none', label: 'None',   blur: 0,  dy: 0,   spread: 0,    alpha: 0    },
      { key: 'sm',   label: 'Soft',   blur: 4,  dy: 1.5, spread: 0,    alpha: 0.18 },
      { key: 'md',   label: 'Medium', blur: 10, dy: 4,   spread: 0,    alpha: 0.24 },
      { key: 'lg',   label: 'Strong', blur: 20, dy: 8,   spread: 0,    alpha: 0.30 },
    ];
    const shadowByKey = Object.fromEntries(SHADOW_LEVELS.map(s => [s.key, s]));
    /* Legacy docs stored shadow as a boolean. Map it onto the new scale. */
    function normShadow(v) {
      if (v === true || v === undefined || v === null) return 'sm';
      if (v === false) return 'none';
      return shadowByKey[v] ? v : 'sm';
    }
    function shadowCss(el) {
      const lv = shadowByKey[normShadow(el.shadow)];
      if (!lv || lv.key === 'none') return 'none';
      const c = hexToRgba(el.shadowColor || '#0f172a', lv.alpha);
      return `0 ${lv.dy}px ${lv.blur}px ${c}`;
    }
    function hexToRgba(hex, a) {
      const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex || '#0f172a');
      if (!m) return `rgba(15,23,42,${a})`;
      return `rgba(${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)},${a})`;
    }

    /* ============================================================================
       RICH TEXT
       ----------------------------------------------------------------------------
       Text is stored as a small, deliberately restricted HTML subset so that word
       and character level styling survives a round trip through both the DOM
       editor and the SVG exporter:

           <div>          paragraph
           <div data-list="disc|dash|decimal|lower-alpha|upper-roman" data-lvl="0">
                          list item, marker style carried on the node itself
           <b> <i> <u> <s>            inline weight / posture / decoration
           <span style="color:…;font-size:…px;font-family:…">   inline overrides

       Anything else is stripped on paste. Both the canvas renderer and the export
       serialiser walk the same tree, so what you see is what prints.
       ========================================================================== */

    const LIST_STYLES = [
      { key: 'disc',        label: 'Bullet',  marker: (i) => '•' },
      { key: 'dash',        label: 'Dash',    marker: (i) => '–' },
      { key: 'circle',      label: 'Circle',  marker: (i) => '◦' },
      { key: 'square',      label: 'Square',  marker: (i) => '▪' },
      { key: 'decimal',     label: '1. 2. 3.', marker: (i) => `${i + 1}.` },
      { key: 'paren',       label: '1) 2) 3)', marker: (i) => `${i + 1})` },
      { key: 'lower-alpha', label: 'a. b. c.', marker: (i) => `${String.fromCharCode(97 + (i % 26))}.` },
      { key: 'upper-roman', label: 'I. II.',   marker: (i) => romanise(i + 1) + '.' },
    ];
    const listByKey = Object.fromEntries(LIST_STYLES.map(l => [l.key, l]));
    const ORDERED_LISTS = new Set(['decimal', 'paren', 'lower-alpha', 'upper-roman']);

    function romanise(n) {
      const map = [[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
      let out = '';
      for (const [v, sym] of map) while (n >= v) { out += sym; n -= v; }
      return out;
    }

    /* ---- Text measurement ----------------------------------------------------
       A single offscreen 2D context gives real font metrics. Both the on-canvas
       preview and the exporter wrap against these numbers, which is what keeps
       exported line breaks identical to the ones on screen. Results are memoised
       because wrapping calls this once per word per re-render.                  */
    let _measureCtx = null;
    const _measureCache = new Map();
    function measureText(str, f) {
      if (!str) return 0;
      const key = `${f.size}|${f.weight}|${f.italic ? 1 : 0}|${f.family}|${str}`;
      const hit = _measureCache.get(key);
      if (hit !== undefined) return hit;
      if (!_measureCtx) {
        try { _measureCtx = document.createElement('canvas').getContext('2d'); }
        catch (err) { _measureCtx = null; }
      }
      let w;
      if (_measureCtx) {
        _measureCtx.font = `${f.italic ? 'italic ' : ''}${f.weight || 400} ${f.size}px ${f.family || 'sans-serif'}`;
        w = _measureCtx.measureText(str).width;
      } else {
        w = str.length * f.size * 0.5;
      }
      if (_measureCache.size > 20000) _measureCache.clear();
      _measureCache.set(key, w);
      return w;
    }

    /* ---- HTML -> blocks ------------------------------------------------------
       Produces [{ list, listIndex, runs:[{text, bold, italic, underline, strike,
       color, size, family}] }]. `size` is a multiplier of the element font size
       so that rescaling the poster keeps inline overrides proportional.         */
    function htmlToBlocks(html, baseStyle) {
      const blocks = [];
      let doc;
      try {
        doc = new DOMParser().parseFromString(`<div id="r">${html || ''}</div>`, 'text/html');
      } catch (err) { doc = null; }
      const root = doc && doc.getElementById('r');
      if (!root) return [{ list: null, runs: [{ text: String(html || ''), ...baseStyle }] }];

      let current = null;
      const startBlock = (list) => { current = { list: list || null, runs: [] }; blocks.push(current); return current; };

      const walk = (node, inherited) => {
        for (const child of node.childNodes) {
          if (child.nodeType === 3) {
            const text = child.nodeValue.replace(/\u00a0/g, ' ');
            if (!text) continue;
            if (!current) startBlock(null);
            current.runs.push({ ...inherited, text });
            continue;
          }
          if (child.nodeType !== 1) continue;
          const tag = child.tagName.toLowerCase();

          if (tag === 'br') { if (!current) startBlock(null); startBlock(current ? current.list : null); continue; }

          if (tag === 'div' || tag === 'p' || tag === 'li') {
            const list = child.getAttribute && child.getAttribute('data-list');
            startBlock(list);
            walk(child, inherited);
            current = null;
            continue;
          }
          if (tag === 'ul' || tag === 'ol') { walk(child, inherited); continue; }

          const next = { ...inherited };
          if (tag === 'b' || tag === 'strong') next.bold = true;
          if (tag === 'i' || tag === 'em') next.italic = true;
          if (tag === 'u') next.underline = true;
          if (tag === 's' || tag === 'strike' || tag === 'del') next.strike = true;
          const st = child.style || {};
          if (st.fontWeight === 'bold' || +st.fontWeight >= 600) next.bold = true;
          if (st.fontStyle === 'italic') next.italic = true;
          if (st.textDecorationLine === 'underline' || st.textDecoration === 'underline') next.underline = true;
          if (st.color) next.color = st.color;
          if (st.fontFamily) next.family = st.fontFamily.replace(/^["']|["']$/g, '');
          if (st.fontSize && st.fontSize.endsWith('px')) next.sizeAbs = parseFloat(st.fontSize);
          walk(child, next);
        }
      };
      walk(root, baseStyle);

      // Number list items per contiguous run of the same marker style.
      let counter = 0, prev = null;
      for (const b of blocks) {
        if (b.list && ORDERED_LISTS.has(b.list)) { counter = (prev === b.list ? counter + 1 : 0); b.listIndex = counter; }
        else b.listIndex = 0;
        prev = b.list;
      }
      return blocks.length ? blocks : [{ list: null, runs: [] }];
    }

    /* Plain string -> the same block shape, so legacy elements keep working. */
    function plainToBlocks(text, baseStyle) {
      return String(text ?? '').split('\n').map((ln) => ({ list: null, listIndex: 0, runs: ln ? [{ ...baseStyle, text: ln }] : [] }));
    }
    function elBlocks(el, baseStyle) {
      return el.html != null ? htmlToBlocks(el.html, baseStyle) : plainToBlocks(el.text, baseStyle);
    }
    function blocksToPlain(blocks) {
      return blocks.map(b => b.runs.map(r => r.text).join('')).join('\n');
    }

    /* ---- Wrapping ------------------------------------------------------------
       Greedy wrap over styled runs. Each run is split into words; a word is
       measured with its own font, so a bold word inside a light paragraph
       contributes its true advance width rather than an average.

           lineWidth = Σ measure(wordᵢ, styleᵢ)  ≤  maxWidth

       Returns [[{text, style…}]] — one array of runs per visual line.          */
    function wrapRuns(runs, maxWidth) {
      const lines = [];
      let line = [], lineW = 0;
      const push = () => { lines.push(line); line = []; lineW = 0; };

      for (const run of runs) {
        if (!run.text) continue;
        const f = { size: run.sizeAbs || run.size, weight: run.bold ? 700 : 400, italic: run.italic, family: run.family };
        const parts = run.text.split(/(\s+)/);
        for (const part of parts) {
          if (!part) continue;
          const w = measureText(part, f);
          const isSpace = /^\s+$/.test(part);
          if (!isSpace && lineW + w > maxWidth && lineW > 0) push();
          if (isSpace && lineW === 0) continue;              // swallow leading space after a break
          const last = line[line.length - 1];
          if (last && last.__k === runKey(run)) { last.text += part; }
          else line.push({ ...run, text: part, __k: runKey(run) });
          lineW += w;
        }
      }
      push();
      return lines;
    }
    function runKey(r) { return `${r.bold?1:0}${r.italic?1:0}${r.underline?1:0}${r.strike?1:0}|${r.color}|${r.sizeAbs || r.size}|${r.family}`; }
    function lineWidth(lineRuns) {
      return lineRuns.reduce((acc, r) => acc + measureText(r.text, { size: r.sizeAbs || r.size, weight: r.bold ? 700 : 400, italic: r.italic, family: r.family }), 0);
    }

    /* ---- Sanitiser -----------------------------------------------------------
       Runs on paste and before every commit. Keeps the tag subset above, drops
       everything else (scripts, images, class names, stray attributes).        */
    const ALLOWED_TAGS = new Set(['DIV','BR','B','STRONG','I','EM','U','S','STRIKE','DEL','SPAN','P','LI','UL','OL','FONT']);
    function sanitiseRichHtml(html) {
      let doc;
      try { doc = new DOMParser().parseFromString(`<div id="r">${html || ''}</div>`, 'text/html'); }
      catch (err) { return esc(String(html || '')); }
      const root = doc.getElementById('r');
      if (!root) return '';
      const scrub = (node) => {
        for (const child of [...node.childNodes]) {
          if (child.nodeType === 8) { child.remove(); continue; }
          if (child.nodeType !== 1) continue;
          // Script/style are removed with their contents, not unwrapped.
          if (child.tagName === 'SCRIPT' || child.tagName === 'STYLE' || child.tagName === 'IFRAME') { child.remove(); continue; }
          if (!ALLOWED_TAGS.has(child.tagName)) {
            while (child.firstChild) node.insertBefore(child.firstChild, child);
            child.remove();
            continue;
          }
          const keepList = child.getAttribute('data-list');
          const keepStyle = child.style ? {
            color: child.style.color,
            fontSize: child.style.fontSize,
            fontFamily: child.style.fontFamily,
            fontWeight: child.style.fontWeight,
            fontStyle: child.style.fontStyle,
            textDecoration: child.style.textDecorationLine || child.style.textDecoration,
          } : null;
          for (const a of [...child.attributes]) child.removeAttribute(a.name);
          if (keepList) child.setAttribute('data-list', keepList);
          if (keepStyle) {
            const parts = [];
            if (keepStyle.color) parts.push(`color:${keepStyle.color}`);
            if (keepStyle.fontSize) parts.push(`font-size:${keepStyle.fontSize}`);
            if (keepStyle.fontFamily) parts.push(`font-family:${keepStyle.fontFamily}`);
            if (keepStyle.fontWeight) parts.push(`font-weight:${keepStyle.fontWeight}`);
            if (keepStyle.fontStyle) parts.push(`font-style:${keepStyle.fontStyle}`);
            if (keepStyle.textDecoration) parts.push(`text-decoration:${keepStyle.textDecoration}`);
            if (parts.length) child.setAttribute('style', parts.join(';'));
          }
          scrub(child);
        }
      };
      scrub(root);
      return root.innerHTML;
    }
    function plainToHtml(text) {
      return String(text ?? '').split('\n').map(l => `<div>${esc(l) || '<br>'}</div>`).join('');
    }

    /* ---- Auto-list detection -------------------------------------------------
       Typing "1." / "1)" / "-" / "*" / "a." / "i." then SPACE converts just the
       current line into a list item. Everything above and below it is untouched,
       so a section can hold prose and a list at the same time.                 */
    const AUTOLIST_PATTERNS = [
      { re: /^\s*[-–—]$/,             list: 'dash'        },
      { re: /^\s*[*•]$/,              list: 'disc'        },
      { re: /^\s*\d{1,3}\.$/,         list: 'decimal'     },
      { re: /^\s*\d{1,3}\)$/,         list: 'paren'       },
      { re: /^\s*[a-z]\.$/,           list: 'lower-alpha' },
      { re: /^\s*[ivxIVX]{1,5}\.$/,   list: 'upper-roman' },
    ];

    function currentBlock(root) {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return null;
      let n = sel.getRangeAt(0).startContainer;
      if (n === root) {
        const kids = root.childNodes;
        n = kids[Math.min(sel.getRangeAt(0).startOffset, kids.length - 1)] || root;
      }
      while (n && n.parentNode !== root) { if (!n.parentNode) return null; n = n.parentNode; }
      return n && n.nodeType === 1 ? n : null;
    }

    function RichTextEditor({ el, html, style, listStyleDefault, onCommit, onEndEdit, autoFocus = true }) {
      const ref = useRef(null);

      useEffect(() => {
        const node = ref.current;
        if (!node) return;
        node.innerHTML = html || '<div><br></div>';
        if (autoFocus) {
          node.focus();
          // Caret to the end rather than the start — matches every other editor.
          const r = document.createRange();
          r.selectNodeContents(node); r.collapse(false);
          const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
        }
        try { document.execCommand('styleWithCSS', false, true); } catch (err) {}
      }, []);

      const commit = () => {
        const node = ref.current;
        if (!node) return;
        onCommit(sanitiseRichHtml(node.innerHTML));
      };

      const onKeyDown = (e) => {
        const node = ref.current;
        if (!node) return;
        e.stopPropagation();          // keep canvas shortcuts (delete, ctrl+z) out of the editor

        if (e.key === 'Escape') { e.preventDefault(); commit(); onEndEdit(); return; }

        if (e.key === ' ') {
          const blk = currentBlock(node);
          if (blk && !blk.getAttribute('data-list')) {
            const txt = blk.textContent || '';
            const sel = window.getSelection();
            const atEnd = sel && sel.isCollapsed && sel.anchorOffset === (sel.anchorNode?.nodeValue?.length ?? -1);
            const hit = AUTOLIST_PATTERNS.find(p => p.re.test(txt));
            if (hit && atEnd !== false) {
              e.preventDefault();
              blk.setAttribute('data-list', hit.list);
              blk.textContent = '';
              blk.appendChild(document.createElement('br'));
              const r = document.createRange();
              r.setStart(blk, 0); r.collapse(true);
              const s2 = window.getSelection(); s2.removeAllRanges(); s2.addRange(r);
              return;
            }
          }
        }

        if (e.key === 'Enter' && !e.shiftKey) {
          const blk = currentBlock(node);
          const list = blk && blk.getAttribute('data-list');
          if (list) {
            const empty = !(blk.textContent || '').trim();
            e.preventDefault();
            if (empty) {
              // Second Enter on an empty item leaves the list, as expected.
              blk.removeAttribute('data-list');
              return;
            }
            const nb = document.createElement('div');
            nb.setAttribute('data-list', list);
            nb.appendChild(document.createElement('br'));
            blk.parentNode.insertBefore(nb, blk.nextSibling);
            const r = document.createRange();
            r.setStart(nb, 0); r.collapse(true);
            const s2 = window.getSelection(); s2.removeAllRanges(); s2.addRange(r);
            return;
          }
        }

        if (e.key === 'Backspace') {
          const blk = currentBlock(node);
          const sel = window.getSelection();
          if (blk && blk.getAttribute('data-list') && sel?.isCollapsed && (sel.anchorOffset === 0)) {
            e.preventDefault();
            blk.removeAttribute('data-list');   // Backspace at item start unwraps it
          }
        }
      };

      const onPaste = (e) => {
        e.preventDefault();
        const cd = e.clipboardData;
        const html = cd?.getData('text/html');
        const text = cd?.getData('text/plain') || '';
        const payload = html ? sanitiseRichHtml(html) : plainToHtml(text);
        try { document.execCommand('insertHTML', false, payload); }
        catch (err) { document.execCommand('insertText', false, text); }
      };

      return (
        <div ref={ref} contentEditable suppressContentEditableWarning
             data-rich-editor="1"
             onPointerDown={(e) => e.stopPropagation()}
             onDoubleClick={(e) => e.stopPropagation()}
             onKeyDown={onKeyDown}
             onPaste={onPaste}
             onBlur={(e) => {
               // Clicking the format toolbar must not end the edit session.
               if (e.relatedTarget && e.relatedTarget.closest?.('[data-format-toolbar]')) return;
               commit(); onEndEdit();
             }}
             className="rich-editor"
             style={{ ...style, whiteSpace: 'pre-wrap', outline: 'none', cursor: 'text' }} />
      );
    }

    /* ---- Read-only rich rendering -------------------------------------------
       Blocks are rendered explicitly rather than via dangerouslySetInnerHTML so
       list markers, indents and alignment match the exporter exactly.          */
    function RichTextRender({ el, baseStyle, style }) {
      const blocks = elBlocks(el, baseStyle);
      const markerGap = baseStyle.size * 0.45;
      return (
        <div style={style}>
          {blocks.map((b, i) => {
            const runs = b.runs.length ? b.runs : [{ ...baseStyle, text: '' }];
            const content = runs.map((r, j) => (
              <span key={j} style={{
                fontWeight: r.bold ? 700 : 400,
                fontStyle: r.italic ? 'italic' : 'normal',
                textDecoration: [r.underline ? 'underline' : '', r.strike ? 'line-through' : ''].filter(Boolean).join(' ') || 'none',
                color: r.color, fontFamily: r.family,
                fontSize: (r.sizeAbs || r.size) + 'px',
              }}>{r.text || '\u200b'}</span>
            ));
            if (!b.list) return <div key={i} style={{ minHeight: '1em' }}>{content}</div>;
            const lst = listByKey[b.list] || listByKey.disc;
            return (
              <div key={i} style={{ display: 'flex', gap: markerGap, alignItems: 'baseline' }}>
                <span style={{ flexShrink: 0, minWidth: baseStyle.size * (ORDERED_LISTS.has(b.list) ? 1.5 : 0.9), color: el.accent || baseStyle.color, fontWeight: 600 }}>
                  {lst.marker(b.listIndex || 0)}
                </span>
                <span style={{ flex: 1 }}>{content}</span>
              </div>
            );
          })}
        </div>
      );
    }

    /* ---- Floating format toolbar --------------------------------------------
       Docked to the top of the workspace rather than tracking the caret: the
       poster can be zoomed, panned and rotated, and a docked bar stays reachable
       and unclipped in every one of those states. Buttons suppress mousedown so
       the text selection they are about to act on survives the click.          */
    function FormatToolbar({ t, el, onPatch, onListStyle }) {
      const cmd = (name, value) => {
        try { document.execCommand('styleWithCSS', false, true); document.execCommand(name, false, value); } catch (err) {}
      };
      const noBlur = (e) => e.preventDefault();
      const Btn = ({ onClick, title, children, style }) => (
        <button data-format-toolbar onMouseDown={noBlur} onClick={onClick} title={title}
          className={`h-8 min-w-8 px-2 rounded-md border text-xs grid place-items-center ${t.chip} ${t.hover}`} style={style}>{children}</button>
      );
      const sizes = [0.75, 0.9, 1, 1.25, 1.5, 2];
      const baseFs = el.fontSize || 14;

      return (
        <div data-format-toolbar onMouseDown={noBlur}
          className={`absolute top-2 left-1/2 -translate-x-1/2 z-[60] flex items-center gap-1 px-2 py-1.5 rounded-xl border shadow-2xl ${t.panel}`}>
          <Btn title="Bold (Ctrl+B)" onClick={() => cmd('bold')} style={{ fontWeight: 800 }}>B</Btn>
          <Btn title="Italic (Ctrl+I)" onClick={() => cmd('italic')} style={{ fontStyle: 'italic' }}>I</Btn>
          <Btn title="Underline (Ctrl+U)" onClick={() => cmd('underline')} style={{ textDecoration: 'underline' }}>U</Btn>
          <Btn title="Strikethrough" onClick={() => cmd('strikeThrough')} style={{ textDecoration: 'line-through' }}>S</Btn>

          <div className="w-px h-6 bg-current opacity-15 mx-0.5" />

          <label data-format-toolbar onMouseDown={noBlur} title="Text colour"
                 className={`h-8 w-8 grid place-items-center rounded-md border cursor-pointer ${t.chip}`}>
            <input type="color" defaultValue={el.color || '#111827'} onMouseDown={noBlur}
                   onChange={(e) => cmd('foreColor', e.target.value)}
                   className="w-5 h-5 border-0 bg-transparent cursor-pointer p-0" />
          </label>

          <select data-format-toolbar onMouseDown={(e) => e.stopPropagation()}
                  defaultValue=""
                  onChange={(e) => { const v = e.target.value; if (v) cmd('fontName', v); e.target.value = ''; }}
                  className={`h-8 px-1 rounded-md border text-xs ${t.input}`} title="Font for selection">
            <option value="">Font…</option>
            {FONTS.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
          </select>

          <select data-format-toolbar onMouseDown={(e) => e.stopPropagation()}
                  defaultValue=""
                  onChange={(e) => {
                    const mult = +e.target.value;
                    if (mult) {
                      // execCommand fontSize only accepts 1-7, so apply a real px
                      // value by wrapping the selection ourselves.
                      cmd('fontSize', 4);
                      const px = Math.round(baseFs * mult);
                      const scope = document.querySelector('[data-rich-editor="1"]') || document;
                      scope.querySelectorAll('font[size="4"]').forEach((f) => {
                        const sp = document.createElement('span');
                        sp.style.fontSize = px + 'px';
                        while (f.firstChild) sp.appendChild(f.firstChild);
                        f.replaceWith(sp);
                      });
                    }
                    e.target.value = '';
                  }}
                  className={`h-8 px-1 rounded-md border text-xs ${t.input}`} title="Size for selection">
            <option value="">Size…</option>
            {sizes.map(m => <option key={m} value={m}>{Math.round(baseFs * m)} pt</option>)}
          </select>

          <div className="w-px h-6 bg-current opacity-15 mx-0.5" />

          <select data-format-toolbar onMouseDown={(e) => e.stopPropagation()}
                  defaultValue=""
                  onChange={(e) => { if (e.target.value) onListStyle(e.target.value); e.target.value = ''; }}
                  className={`h-8 px-1 rounded-md border text-xs ${t.input}`} title="Turn the current line into a list">
            <option value="">List…</option>
            {LIST_STYLES.map(l => <option key={l.key} value={l.key}>{l.label}</option>)}
            <option value="__none">Remove list</option>
          </select>

          <span className={`text-[10px] px-1 ${t.sub}`}>Esc to finish</span>
        </div>
      );
    }

    /* ----------------------------- Components --------------------------------- */
    function FlyoutTool({ icon: Icon, label, theme: t, active, open, onEnter, onLeave, children }) {
      /* The panel is positioned flush against the rail (left-full, no margin) and
         carries its own padding-left, so the pointer never crosses a dead gap on
         its way from the button into the menu — that gap was what made the menu
         vanish mid-reach. Width is intrinsic so children can never overflow.   */
      return (
        <div className="relative" onMouseEnter={onEnter} onMouseLeave={onLeave}>
          <button title={label} className={`h-11 w-11 grid place-items-center rounded-xl transition-colors ${active || open ? 'bg-cyan-500/10 text-cyan-400' : t.hover}`}>
            <Icon size={19} />
          </button>
          {open && (
            <div className="absolute left-full top-0 pl-1 z-50" onMouseEnter={onEnter} onMouseLeave={onLeave}>
              <div className={`w-max max-w-[19rem] p-2 rounded-xl border shadow-xl ${t.panel}`}>
                {children}
              </div>
            </div>
          )}
        </div>
      );
    }
    
    function ColorRow({ t, value, onChange, swatches }) {
      return (
        <div className="flex items-center gap-1.5 flex-wrap">
          {swatches.map((c) => (
            <button key={c} onClick={() => onChange(c)} className={`w-6 h-6 rounded-md border ${value === c ? 'ring-2 ring-cyan-400' : ''}`}
              style={{ background: c === 'none' ? 'repeating-conic-gradient(#cbd5e1 0% 25%, #fff 0% 50%) 50%/8px 8px' : c, borderColor: 'rgba(120,120,120,0.3)' }} title={c} />
          ))}
          <input type="color" value={value === 'none' ? '#ffffff' : value} onChange={(e) => onChange(e.target.value)}
            className="w-6 h-6 rounded-md border-0 bg-transparent cursor-pointer" />
        </div>
      );
    }

    function NumField({ t, label, value, onChange, min, max }) {
      const [local, setLocal] = useState(value?.toString() || '');
      useEffect(() => { setLocal(value?.toString() || ''); }, [value]);
      
      const flush = () => {
        let parsed = parseFloat(local);
        if (!isNaN(parsed)) {
          if (min !== undefined && parsed < min) parsed = min;
          if (max !== undefined && parsed > max) parsed = max;
          onChange(parsed);
          setLocal(parsed.toString());
        } else {
          setLocal(value?.toString() || '');
        }
      };

      return (
        <label className="flex-1 block">
          <div className={`text-[10px] mb-1 ${t.sub}`}>{label}</div>
          <input type="number" value={local} onChange={e => setLocal(e.target.value)} onBlur={flush} onKeyDown={e => e.key === 'Enter' && flush()} 
                 className={`w-full h-8 px-2 rounded-md border text-xs tabular-nums ${t.input}`} />
        </label>
      );
    }

    /* ============================================================================
       MAIN COMPONENT
       ========================================================================== */
    function PosterettoStudio() {
      const [dark, setDark] = useState(true);
      const [sizeKey, setSizeKey] = useState('A0');
      const [customSize, setCustomSize] = useState({ w: 700, h: 1000 });
      const [showCanvasModal, setShowCanvasModal] = useState(false);
      const [modalW, setModalW] = useState("");
      const [modalH, setModalH] = useState("");
      const poster = sizeKey === 'custom' ? customSize : POSTER_SIZES[sizeKey];

      const [elements, setElements] = useState([]);
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [editingId, setEditingId] = useState(null);
      const [editTarget, setEditTarget] = useState('body');   // 'body' | 'title'
      const figureTargetRef = useRef(null);
      const figureInputRef = useRef(null);
      const [tool, setTool] = useState('select');      
      const [pendingVariant, setPendingVariant] = useState('arrow');
      const [snapOn, setSnapOn] = useState(true);
      const [guides, setGuides] = useState([]);
      const [draft, setDraft] = useState(null);         
      const [hoverStitch, setHoverStitch] = useState(null); 
      const [zoomMode, setZoomMode] = useState('fit');
      const [viewport, setViewport] = useState({ w: 1000, h: 700 });
      const [menu, setMenu] = useState(null);
      const [exportState, setExportState] = useState(null);
      
      const [isPanning, setIsPanning] = useState(false);
      const [rotSnap, setRotSnap] = useState(null);      // live rotation-detent readout
      const [showGrid, setShowGrid] = useState(false);
      const [gridMm, setGridMm] = useState(10);
      const [freeArrows, setFreeArrows] = useState(false); // when true, connectors never stitch
      const [saveHint, setSaveHint] = useState('');
      const restoredRef = useRef(false);
      const projectInputRef = useRef(null);

      /* ------- Autosave / restore (localStorage) ------- */
      useEffect(() => {
        try {
          const raw = window.localStorage.getItem('posteretto:autosave');
          if (raw) {
            const doc = JSON.parse(raw);
            if (Array.isArray(doc.elements)) {
              setElements(doc.elements);
              if (doc.sizeKey) setSizeKey(doc.sizeKey);
              if (doc.customSize) setCustomSize(doc.customSize);
              setSaveHint('Restored your last session');
              setTimeout(() => setSaveHint(''), 2600);
            }
          }
        } catch (err) { console.warn('Restore failed', err); }
        restoredRef.current = true;
      }, []);

      useEffect(() => {
        if (!restoredRef.current) return;
        const id = setTimeout(() => {
          try {
            window.localStorage.setItem('posteretto:autosave', JSON.stringify({ v: 1, elements, sizeKey, customSize }));
          } catch (err) {
            // quota exceeded (usually large embedded images) - fail quietly
          }
        }, 700);
        return () => clearTimeout(id);
      }, [elements, sizeKey, customSize]);

      const saveProject = useCallback(() => {
        const doc = { app: 'Posteretto', v: 1, savedAt: new Date().toISOString(), sizeKey, customSize, elements };
        const blob = new Blob([JSON.stringify(doc, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'posteretto-project.json';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setSaveHint('Project file saved');
        setTimeout(() => setSaveHint(''), 2200);
      }, [elements, sizeKey, customSize]);

      const openProject = useCallback((file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const doc = JSON.parse(reader.result);
            if (!Array.isArray(doc.elements)) throw new Error('Not a Posteretto project');
            history.current.past.push(elements);
            history.current.future = [];
            setElements(doc.elements);
            if (doc.sizeKey) setSizeKey(doc.sizeKey);
            if (doc.customSize) setCustomSize(doc.customSize);
            setSelectedIds(new Set());
            setSaveHint('Project loaded');
            setTimeout(() => setSaveHint(''), 2200);
          } catch (err) {
            setSaveHint("That file could not be read as a Posteretto project");
            setTimeout(() => setSaveHint(''), 3200);
          }
        };
        reader.readAsText(file);
      }, [elements]);


      const viewportRef = useRef(null);
      const surfaceRef = useRef(null);
      const interaction = useRef(null);
      const panRef = useRef(null);

      /* ------- History & Clipboard ------- */
      const history = useRef({ past: [], future: [] });
      const clipboard = useRef([]);

      const commit = useCallback((stateToSave) => {
        history.current.past.push(stateToSave);
        history.current.future = []; 
      }, []);

      const commitEdit = useCallback((id, field, value) => {
        setElements(curr => {
          history.current.past.push(curr);
          history.current.future = [];
          return curr.map(el => el.id === id ? { ...el, [field]: value } : el);
        });
      }, []);

      const undo = useCallback(() => {
        if (history.current.past.length === 0) return;
        setElements(curr => {
          const prev = history.current.past.pop();
          history.current.future.push(curr);
          setSelectedIds(new Set());
          return prev;
        });
      }, []);

      const redo = useCallback(() => {
        if (history.current.future.length === 0) return;
        setElements(curr => {
          const next = history.current.future.pop();
          history.current.past.push(curr);
          setSelectedIds(new Set());
          return next;
        });
      }, []);

      const byId = useMemo(() => Object.fromEntries(elements.map((e) => [e.id, e])), [elements]);
      const selected = selectedIds.size === 1 ? elements.find((e) => selectedIds.has(e.id)) || null : null;

      /* ------- Canvas Rescaling Engine ------- */
      /* Inline runs carry absolute px sizes, so a poster resize has to walk the
         stored HTML and scale them too — otherwise a word styled at 22pt keeps
         that size while everything around it shrinks. */
      const scaleHtmlSizes = (html, k) => {
        if (!html) return html;
        return String(html).replace(/font-size:\s*([\d.]+)px/g, (m, v) => `font-size:${(parseFloat(v) * k).toFixed(2)}px`);
      };

      const applyCanvasSizeChange = useCallback((newW, newH) => {
        const scale = Math.min(newW / poster.w, newH / poster.h);
        if (!isFinite(scale) || scale === 1) return;

        // Re-centre the whole composition in the new sheet so a change of aspect
        // ratio doesn't push everything against the top-left corner.
        const offX = (newW - poster.w * scale) / 2;
        const offY = (newH - poster.h * scale) / 2;
        const SX = (v) => v * scale + offX;
        const SY = (v) => v * scale + offY;

        commit(elements);
        setElements(prev => prev.map(el => {
          let newEl = { ...el };
          if (newEl.x !== undefined) newEl.x = SX(newEl.x);
          if (newEl.y !== undefined) newEl.y = SY(newEl.y);
          if (newEl.w) newEl.w *= scale;
          if (newEl.h) newEl.h *= scale;
          // Everything measured in mm scales with the sheet.
          ['fontSize', 'strokeWidth', 'radius', 'padding', 'cornerRadius', 'borderW'].forEach((k) => {
            if (typeof newEl[k] === 'number' && newEl[k] > 0) newEl[k] = Math.max(k === 'fontSize' ? 2 : 0, newEl[k] * scale);
          });
          // Inline runs carry absolute px sizes; scale those too.
          if (newEl.html) newEl.html = scaleHtmlSizes(newEl.html, scale);
          if (newEl.titleHtml) newEl.titleHtml = scaleHtmlSizes(newEl.titleHtml, scale);

          if (newEl.type === 'path') {
            newEl.points = newEl.points.map(p => ({ x: SX(p.x), y: SY(p.y) }));
          }
          if (newEl.type === 'image') {
            if (newEl.imgX !== undefined) newEl.imgX = SX(newEl.imgX);
            if (newEl.imgY !== undefined) newEl.imgY = SY(newEl.imgY);
            if (newEl.imgW !== undefined) newEl.imgW *= scale;
            if (newEl.imgH !== undefined) newEl.imgH *= scale;
          }
          if (newEl.type === 'connector') {
            newEl.start = { ...newEl.start }; newEl.end = { ...newEl.end };
            if (newEl.start.elId == null) { newEl.start.x = SX(newEl.start.x); newEl.start.y = SY(newEl.start.y); }
            if (newEl.end.elId == null)   { newEl.end.x   = SX(newEl.end.x);   newEl.end.y   = SY(newEl.end.y); }
          }
          return newEl;
        }));
      }, [poster, elements, commit]);

      /* ------- Fit-to-screen zoom ------- */
      useLayoutEffect(() => {
        const node = viewportRef.current; if (!node) return;
        const ro = new ResizeObserver((es) => { const r = es[0].contentRect; setViewport({ w: r.width, h: r.height }); });
        ro.observe(node); return () => ro.disconnect();
      }, []);
      const zoom = useMemo(() => {
        if (zoomMode !== 'fit') return zoomMode;
        const pad = 64;
        return clamp(Math.min((viewport.w - pad) / poster.w, (viewport.h - pad) / poster.h), 0.05, 4);
      }, [zoomMode, viewport, poster]);

      const toPoster = useCallback((clientX, clientY) => {
        const r = surfaceRef.current.getBoundingClientRect();
        return { x: (clientX - r.left) / zoom, y: (clientY - r.top) / zoom };
      }, [zoom]);

      useEffect(() => {
        const handleWheel = (e) => {
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault(); 
            const dz = e.deltaY > 0 ? -0.05 : 0.05;
            setZoomMode(curr => clamp(+( (curr === 'fit' ? zoom : curr) + dz).toFixed(2), 0.05, 4));
          }
        };
        window.addEventListener('wheel', handleWheel, { passive: false });
        return () => window.removeEventListener('wheel', handleWheel);
      }, [zoom]);

      /* ------- Global Shortcuts ------- */
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'Escape' && editingId) { setEditingId(null); setEditTarget('body'); return; }
          if (editingId || showCanvasModal) return;
          if (document.activeElement?.closest?.('[data-rich-editor="1"]')) return;
          if (document.activeElement && ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;

          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); if (e.shiftKey) redo(); else undo(); return; }
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); return; }
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a') { e.preventDefault(); setSelectedIds(new Set(elements.map(el => el.id))); return; }
          
          if (e.key === 'Escape') { setTool('select'); setDraft(null); setSelectedIds(new Set()); interaction.current = null; return; }

          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') {
            if (selectedIds.size > 0) clipboard.current = elements.filter(el => selectedIds.has(el.id)).map(el => JSON.parse(JSON.stringify(el)));
            return;
          }
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') {
            if (clipboard.current.length > 0) {
              commit(elements);
              const newSelection = new Set();
              const pasted = clipboard.current.map(el => {
                const id = uid(); newSelection.add(id);
                return { ...el, id, x: el.x + 20, y: el.y + 20 };
              });
              setElements(p => [...p, ...pasted]); setSelectedIds(newSelection);
            }
            return;
          }

          if (selectedIds.size === 0) return;
          if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteSelected(); }
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'd') { e.preventDefault(); duplicateSelected(); }
          
          if (selectedIds.size > 0 && elements.some(el => selectedIds.has(el.id) && isBox(el))) {
            const step = e.shiftKey ? 10 : 1;
            const n = { ArrowLeft: [-step, 0], ArrowRight: [step, 0], ArrowUp: [0, -step], ArrowDown: [0, step] }[e.key];
            if (n) { 
              e.preventDefault(); commit(elements);
              setElements((p) => p.map((el) => selectedIds.has(el.id) ? { ...el, x: clamp(el.x + n[0], 0, poster.w - el.w), y: clamp(el.y + n[1], 0, poster.h - el.h) } : el)); 
            }
          }
        };
        window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey);
      }, [selectedIds, editingId, elements, poster, showCanvasModal, commit, undo, redo]);

      /* ------------------------------ Element ops ------------------------------ */
      const addElement = useCallback((el) => {
        commit(elements);
        const id = uid();
        const { at, ...def } = el;
        const w = def.w || 100, h = def.h || 100;
        const x = round(at ? at.x : clamp(poster.w / 2 - w / 2, 0, Math.max(0, poster.w - w)));
        const y = round(at ? at.y : clamp(poster.h / 2 - h / 2, 0, Math.max(0, poster.h - h)));

        let finalEl = { id, x, y, rot: 0, opacity: 1, locked: false, fontFamily: FONTS[0].value, square: false, ...def };
        if (def.type === 'image') {
          finalEl.imgX = x; finalEl.imgY = y; finalEl.imgW = def.w; finalEl.imgH = def.h;
        }

        setElements((p) => [...p, finalEl]);
        setSelectedIds(new Set([id])); setMenu(null);
        return id;
      }, [poster, elements, commit]);

      /* ------- Proportional instantiation -------------------------------------
         Presets are authored at A0 width (BASE_W). posterScale maps them onto
         whatever canvas is active, so geometry AND typography stay in the same
         visual proportion on a 300 mm handout as on a 1189 mm A0 sheet.      */
      const posterScale = poster.w / BASE_W;
      const S = useCallback((v) => Math.max(1, Math.round(v * posterScale * 100) / 100), [posterScale]);

      const addText = () => addElement({ type: 'text', w: S(240), h: S(90), text: 'New text — double-click to edit',
        fontSize: S(20), color: '#0f172a', bold: false, align: 'left', lineHeight: 1.3 });

      const addSection = (preset) => addElement({
        type: 'section', sectionKind: preset.kind || 'plain',
        w: S(preset.w), h: S(preset.h),
        title: preset.title ?? preset.label,
        text: preset.text ?? LOREM,
        rows: preset.rows ? preset.rows.map((r) => [...r]) : undefined,
        fill: preset.fill, accent: preset.accent,
        headerStyle: preset.headerStyle || 'bar',
        fontSize: S(preset.fontSize || 14),
        color: preset.color || '#334155',
        align: 'left', lineHeight: 1.4,
        radius: S(6), borderW: 0, borderColor: preset.accent, padding: S(10),
      });

      const addCustomSection = () => addElement({ type: 'section', sectionKind: 'plain', w: S(260), h: S(200),
        title: 'Custom Section', text: LOREM, fill: '#f1f5f9', accent: '#6366f1', headerStyle: 'bar',
        fontSize: S(14), color: '#334155', align: 'left', lineHeight: 1.4,
        radius: S(6), borderW: 0, borderColor: '#6366f1', padding: S(10), custom: true });

      const addShape = (preset) => addElement({
        type: 'shape',
        shape: preset.key === 'rect-round' ? 'rect' : preset.key,
        w: S(preset.w), h: S(preset.h),
        stroke: '#0e7490', fill: OPEN_SHAPES.has(preset.key) ? 'none' : '#cffafe',
        strokeWidth: S(4),
        cornerRadius: S(preset.cornerRadius || 0),
        dashed: false,
      });

      /* Place an image at an explicit poster point (used by drag-and-drop). */
      const addImageFile = useCallback((file, at) => {
        if (!file || !file.type?.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const maxW = Math.min(S(320), poster.w * 0.5);
            const w = maxW, h = round(maxW * (img.height / img.width));
            addElement({ type: 'image', w, h, src: reader.result,
              ...(at ? { at: { x: clamp(at.x - w / 2, 0, poster.w - w), y: clamp(at.y - h / 2, 0, poster.h - h) } } : {}) });
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      }, [addElement, poster, S]);

      const onUpload = (e) => {
        Array.from(e.target.files || []).forEach((f) => addImageFile(f));
        e.target.value = '';
      };

      /* ------- Drag & drop import ------- */
      const [dropActive, setDropActive] = useState(false);
      const onCanvasDragOver = (e) => {
        if (!Array.from(e.dataTransfer?.types || []).includes('Files')) return;
        e.preventDefault(); e.dataTransfer.dropEffect = 'copy';
        if (!dropActive) setDropActive(true);
      };
      const onCanvasDragLeave = (e) => {
        if (e.currentTarget.contains(e.relatedTarget)) return;
        setDropActive(false);
      };
      const onCanvasDrop = (e) => {
        const files = Array.from(e.dataTransfer?.files || []).filter((f) => f.type.startsWith('image/'));
        if (!files.length) { setDropActive(false); return; }
        e.preventDefault(); setDropActive(false);
        const p = toPoster(e.clientX, e.clientY);
        files.forEach((f, i) => addImageFile(f, { x: p.x + i * S(18), y: p.y + i * S(18) }));
      };

      const patchSelected = (patch) => {
        commit(elements);
        setElements((p) => p.map((el) => (selectedIds.has(el.id) ? { ...el, ...patch } : el)));
      };

      const deleteSelected = () => {
        if (selectedIds.size === 0) return;
        commit(elements); let p = [...elements];
        selectedIds.forEach(id => { p = detachAndRemove(p, id, byId); });
        setElements(p); setSelectedIds(new Set());
      };
      
      const duplicateSelected = () => {
        if (selectedIds.size === 0) return;
        commit(elements);
        const newSelection = new Set(); const copies = [];
        elements.forEach(el => {
          if (selectedIds.has(el.id)) {
            const id = uid(); newSelection.add(id);
            copies.push(el.type === 'connector' ? { ...el, id, start: { ...el.start }, end: { ...el.end } } : { ...el, id, x: el.x + 24, y: el.y + 24, imgX: el.imgX ? el.imgX + 24 : undefined, imgY: el.imgY ? el.imgY + 24 : undefined });
          }
        });
        setElements(p => [...p, ...copies]); setSelectedIds(newSelection);
      };

      const bringToFront = () => { 
        if (selectedIds.size === 0) return;
        commit(elements); 
        setElements(p => {
          const others = p.filter(e => !selectedIds.has(e.id));
          const moving = p.filter(e => selectedIds.has(e.id));
          return [...others, ...moving];
        }); 
      };

      /* --------------------------- Vector Export Pipeline --------------------------- */
      /* ---------------------- Align & distribute -------------------------------
         Works on the union bounding box of the selection (or the sheet itself
         when only one object is selected), matching Figma/Illustrator semantics.
           align:      pᵢ ← f(B)  where B is the reference box
           distribute: gaps equalised as  gap = (span − Σwᵢ) / (n − 1)          */
      const alignSelection = useCallback((mode) => {
        const ids = Array.from(selectedIds);
        const boxes = elements.filter((el) => selectedIds.has(el.id) && isBox(el));
        if (!boxes.length) return;
        const ref = boxes.length > 1
          ? { x: Math.min(...boxes.map(b => b.x)), y: Math.min(...boxes.map(b => b.y)),
              r: Math.max(...boxes.map(b => b.x + b.w)), b: Math.max(...boxes.map(b => b.y + b.h)) }
          : { x: 0, y: 0, r: poster.w, b: poster.h };
        commit(elements);
        setElements((prev) => prev.map((el) => {
          if (!selectedIds.has(el.id) || !isBox(el)) return el;
          switch (mode) {
            case 'left':    return { ...el, x: round(ref.x) };
            case 'hcenter': return { ...el, x: round((ref.x + ref.r) / 2 - el.w / 2) };
            case 'right':   return { ...el, x: round(ref.r - el.w) };
            case 'top':     return { ...el, y: round(ref.y) };
            case 'vcenter': return { ...el, y: round((ref.y + ref.b) / 2 - el.h / 2) };
            case 'bottom':  return { ...el, y: round(ref.b - el.h) };
            default:        return el;
          }
        }));
      }, [selectedIds, elements, poster, commit]);

      const distributeSelection = useCallback((axis) => {
        const boxes = elements.filter((el) => selectedIds.has(el.id) && isBox(el));
        if (boxes.length < 3) return;
        const k = axis === 'x' ? 'x' : 'y', d = axis === 'x' ? 'w' : 'h';
        const sorted = [...boxes].sort((a, b) => a[k] - b[k]);
        const span = (sorted.at(-1)[k] + sorted.at(-1)[d]) - sorted[0][k];
        const gap = (span - sorted.reduce((s, b) => s + b[d], 0)) / (sorted.length - 1);
        const pos = {};
        let cur = sorted[0][k];
        sorted.forEach((b) => { pos[b.id] = round(cur); cur += b[d] + gap; });
        commit(elements);
        setElements((prev) => prev.map((el) => (pos[el.id] !== undefined ? { ...el, [k]: pos[el.id] } : el)));
      }, [selectedIds, elements, commit]);

      const matchSize = useCallback((dim) => {
        const boxes = elements.filter((el) => selectedIds.has(el.id) && isBox(el));
        if (boxes.length < 2) return;
        const target = boxes[0];
        commit(elements);
        setElements((prev) => prev.map((el) => (selectedIds.has(el.id) && isBox(el)
          ? { ...el, ...(dim === 'w' || dim === 'both' ? { w: target.w } : {}), ...(dim === 'h' || dim === 'both' ? { h: target.h } : {}) }
          : el)));
      }, [selectedIds, elements, commit]);

      /* ------------------------------ Export ----------------------------------- */
      const [exportOpen, setExportOpen] = useState(false);
      const [exportFmt, setExportFmt] = useState('pdf');
      const [exportDpi, setExportDpi] = useState(300);

      const posterName = useCallback(() => {
        const banner = elements.find((e) => e.type === 'section' && e.sectionKind === 'banner' && e.title);
        const raw = (banner?.title || `posteretto_${sizeKey}`).trim().toLowerCase();
        return raw.replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '').slice(0, 60) || 'posteretto';
      }, [elements, sizeKey]);

      const runExport = useCallback(async () => {
        setExportState({ busy: true, format: exportFmt });
        // Yield a frame so selection chrome is unmounted before serialising.
        await new Promise((r) => requestAnimationFrame(() => setTimeout(r, 40)));
        const name = posterName();
        let result;
        try {
          const svg = buildSVG(elements, byId, poster);
          if (exportFmt === 'svg') result = exportSVGFile(svg, name);
          else if (exportFmt === 'png' || exportFmt === 'jpg') result = await exportRaster(svg, poster, exportDpi, exportFmt, name);
          else {
            try { result = await exportPDFFile(svg, poster, name); }
            catch (err) { console.warn('Vector PDF path failed, falling back:', err); result = exportPrintFallback(svg, poster, name); }
          }
        } catch (err) {
          console.error(err);
          result = { ok: false, detail: err?.message || 'Export failed. Try a different format.' };
        }
        setExportState({ busy: false, format: exportFmt, result });
      }, [elements, byId, poster, exportFmt, exportDpi, posterName]);

      const closeExport = () => { setExportOpen(false); setExportState(null); };

      /* --------------------------- Interaction start --------------------------- */
      const beginMove = (e, el) => {
        if (e.button === 1) return;
        if (el.locked) { e.stopPropagation(); setSelectedIds(new Set([el.id])); return; }
        if (editingId === el.id || tool !== 'select') return;
        e.stopPropagation(); e.currentTarget.setPointerCapture?.(e.pointerId);

        let newSelected = new Set(selectedIds);
        if (e.ctrlKey || e.metaKey) {
          if (newSelected.has(el.id)) newSelected.delete(el.id); else newSelected.add(el.id);
        } else {
          if (!newSelected.has(el.id)) newSelected = new Set([el.id]);
        }
        setSelectedIds(newSelected);

        const starts = {};
        elements.forEach(item => {
          if (newSelected.has(item.id)) starts[item.id] = { ...item, points: item.type === 'path' ? item.points.map(p => ({...p})) : null };
        });

        interaction.current = { kind: 'move', ids: Array.from(newSelected), pointerId: e.pointerId, startClientX: e.clientX, startClientY: e.clientY, starts, startElements: elements, hasChanged: false };
      };

      const beginResize = (e, el, handle) => {
        if (e.button === 1) return;
        e.stopPropagation(); e.currentTarget.setPointerCapture?.(e.pointerId);
        setSelectedIds(new Set([el.id]));
        interaction.current = { kind: 'resize', id: el.id, handle, pointerId: e.pointerId,
          startClientX: e.clientX, startClientY: e.clientY, start: { ...el }, startElements: elements, hasChanged: false,
          startPoints: el.type === 'path' ? el.points.map((p) => ({ ...p })) : null,
          isCropping: editingId === el.id && el.type === 'image'
        };
      };

      /* Read a dropped/chosen file straight onto a figure block. */
      const attachFigureImage = useCallback((id, file) => {
        if (!file || !file.type?.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = () => {
          setElements((prev) => {
            history.current.past.push(prev);
            history.current.future = [];
            return prev.map((el) => el.id === id ? { ...el, src: reader.result } : el);
          });
        };
        reader.readAsDataURL(file);
      }, []);

      /* Apply / remove a list marker on the block the caret currently sits in. */
      const applyListStyle = useCallback((styleKey) => {
        const root = document.querySelector('[data-rich-editor="1"]');
        if (!root) return;
        const blk = currentBlock(root);
        if (!blk) return;
        if (styleKey === '__none') blk.removeAttribute('data-list');
        else blk.setAttribute('data-list', styleKey);
        root.focus();
      }, []);

      const beginRotate = (e, el) => {
        if (e.button === 1) return;
        e.stopPropagation(); e.currentTarget.setPointerCapture?.(e.pointerId);
        setSelectedIds(new Set([el.id]));
        // Record where the pointer grabbed relative to the centre. Rotation is
        // then applied as a DELTA from the element's existing angle, so grabbing
        // the handle never snaps the element to face the cursor.
        const c = surfaceRef.current?.getBoundingClientRect();
        const cx = (el.x + el.w / 2), cy = (el.y + el.h / 2);
        const pStart = c ? { x: (e.clientX - c.left) / zoom, y: (e.clientY - c.top) / zoom } : { x: cx, y: cy - 1 };
        const grabAngle = Math.atan2(pStart.y - cy, pStart.x - cx) * (180 / Math.PI);
        interaction.current = { kind: 'rotate', id: el.id, pointerId: e.pointerId, start: { ...el },
                                grabAngle, startRot: el.rot || 0, startElements: elements, hasChanged: false };
      };

      const beginCropMove = (e, el) => {
        if (e.button === 1 || tool !== 'select') return;
        e.stopPropagation(); e.currentTarget.setPointerCapture?.(e.pointerId);
        interaction.current = { kind: 'crop-move', id: el.id, pointerId: e.pointerId, startClientX: e.clientX, startClientY: e.clientY, start: { ...el }, startElements: elements, hasChanged: false };
      }

      const onSurfacePointerDown = (e) => {
        if (e.button === 1) return; 
        e.stopPropagation(); e.currentTarget.setPointerCapture?.(e.pointerId);
        const p = toPoster(e.clientX, e.clientY);
        
        if (tool === 'select') { 
          if (!e.ctrlKey && !e.metaKey) setSelectedIds(new Set()); 
          setMenu(null); 
          if (selected?.type === 'image') setEditingId(null);
          interaction.current = { kind: 'marquee', pointerId: e.pointerId, startX: p.x, startY: p.y, curX: p.x, curY: p.y, append: e.ctrlKey || e.metaKey };
          return; 
        }
        
        if (tool === 'connector') {
          const hit = (freeArrows || e.altKey) ? null : elementAt(p.x, p.y, elements, null);
          const start = hit ? { elId: hit.id, anchor: 'auto', x: p.x, y: p.y } : { elId: null, anchor: 'auto', x: p.x, y: p.y };
          interaction.current = { kind: 'draw-connector', pointerId: e.pointerId, start, curEnd: { x: p.x, y: p.y }, startElements: elements };
          setDraft({ kind: 'connector', variant: pendingVariant, start, end: { elId: null, anchor: 'auto', x: p.x, y: p.y } });
        } else if (tool === 'pen') {
          interaction.current = { kind: 'draw-pen', pointerId: e.pointerId, points: [p], startElements: elements };
          setDraft({ kind: 'pen', points: [p] });
        }
      };

      const beginEndpoint = (e, connector, which) => {
        if (e.button === 1) return;
        e.stopPropagation(); e.currentTarget.setPointerCapture?.(e.pointerId);
        setSelectedIds(new Set([connector.id]));
        interaction.current = { kind: 'endpoint', id: connector.id, which, pointerId: e.pointerId, startElements: elements, hasChanged: false };
      };

      const beginConnectorMove = (e, connector) => {
        if (e.button === 1) return;
        if (tool !== 'select') return;
        e.stopPropagation(); e.currentTarget.setPointerCapture?.(e.pointerId);
        setSelectedIds(new Set([connector.id]));
        interaction.current = { kind: 'move-connector', id: connector.id, pointerId: e.pointerId, startClientX: e.clientX, startClientY: e.clientY, start: { ...connector }, startElements: elements, hasChanged: false };
      };

      /* ------------------------------ Pointer move ----------------------------- */
      const handlePointerMove = (e) => {
        const it = interaction.current;
        if (!it || it.pointerId !== e.pointerId) return;

        if (it.kind === 'marquee') {
          const p = toPoster(e.clientX, e.clientY);
          it.curX = p.x; it.curY = p.y;
          setDraft({ kind: 'marquee', x: Math.min(it.startX, it.curX), y: Math.min(it.startY, it.curY), w: Math.abs(it.startX - it.curX), h: Math.abs(it.startY - it.curY) });
        } 
        else if (it.kind === 'move') {
          it.hasChanged = true;
          const dx = (e.clientX - it.startClientX) / zoom, dy = (e.clientY - it.startClientY) / zoom;
          
          let newGuides = [];
          let snappedPos = {};

          if (snapOn && it.ids.length === 1) {
            const id = it.ids[0];
            const start = it.starts[id];
            if (!start.rot) {
              const others = elements.filter((o) => !it.ids.includes(o.id) && isBox(o) && !o.rot);
              let nx = start.x + dx, ny = start.y + dy;
              const snap = computeSnap({ x: nx, y: ny, w: start.w, h: start.h }, others, poster, zoom);
              newGuides = snap.guides;
              snappedPos[id] = {
                nx: clamp(snap.x, 0, poster.w - start.w),
                ny: clamp(snap.y, 0, poster.h - start.h)
              };
            }
          }
          setGuides(newGuides);

          setElements((p) => p.map((el) => {
            if (!it.ids.includes(el.id)) return el;
            const start = it.starts[el.id];
            let nx = start.x + dx, ny = start.y + dy;
            
            if (snappedPos[el.id]) {
              nx = snappedPos[el.id].nx;
              ny = snappedPos[el.id].ny;
            }

            let newProps = { ...el, x: round(nx), y: round(ny) };
            if (el.type === 'path') { 
              const ox = round(nx) - start.x, oy = round(ny) - start.y;
              newProps.points = start.points.map((pt) => ({ x: pt.x + ox, y: pt.y + oy })); 
            }
            if (el.type === 'image') {
               newProps.imgX = (start.imgX ?? start.x) + (round(nx) - start.x);
               newProps.imgY = (start.imgY ?? start.y) + (round(ny) - start.y);
            }
            return newProps;
          }));
        } 
        else if (it.kind === 'rotate') {
          it.hasChanged = true;
          const p = toPoster(e.clientX, e.clientY);
          const cx = it.start.x + it.start.w / 2;
          const cy = it.start.y + it.start.h / 2;
          const nowAngle = Math.atan2(p.y - cy, p.x - cx) * (180 / Math.PI);
          let angle = it.startRot + (nowAngle - it.grabAngle);
          angle = ((angle % 360) + 360) % 360;

          /* Detent model. Cardinal angles (0/90/180/270) get a wide capture
             window so "perfectly horizontal / vertical" is easy to land on and
             hard to lose; 15° steps get a narrow one. Alt disables snapping for
             free rotation.
                 snapped = argmin |θ − dᵢ|  subject to |θ − dᵢ| ≤ toleranceᵢ     */
          let snappedTo = null;
          if (!e.altKey) {
            const dist = (a, b) => { const d = Math.abs(((a - b) % 360 + 540) % 360 - 180); return 180 - d; };
            const CARDINAL_TOL = 6, STEP_TOL = 2.5;
            let best = null;
            for (const d of [0, 90, 180, 270]) {
              const dd = dist(angle, d);
              if (dd <= CARDINAL_TOL && (!best || dd < best.d)) best = { d: dd, val: d, hard: true };
            }
            if (!best) {
              const step = Math.round(angle / 15) * 15;
              if (dist(angle, step) <= STEP_TOL) best = { d: dist(angle, step), val: ((step % 360) + 360) % 360, hard: false };
            }
            if (best) { angle = best.val; snappedTo = best; }
          }
          setRotSnap(snappedTo ? { angle, hard: snappedTo.hard } : null);
          setElements(prev => prev.map(el => el.id === it.id ? { ...el, rot: Math.round(angle * 10) / 10 } : el));
        }
        else if (it.kind === 'resize') {
          it.hasChanged = true;
          const dx = (e.clientX - it.startClientX) / zoom, dy = (e.clientY - it.startClientY) / zoom;
          const isCropping = it.isCropping;

          const others = elements.filter((el) => el.id !== it.id && isBox(el) && !el.rot);
          const h = it.handle; 
          
          let newW = it.start.w;
          let newH = it.start.h;
          let newX = it.start.x;
          let newY = it.start.y;
          
          const isCenter = e.ctrlKey || e.metaKey;
          const isProportional = e.shiftKey;
          const aspect = it.start.w / it.start.h;
          const cx = it.start.x + it.start.w / 2;
          const cy = it.start.y + it.start.h / 2;

          if (h.includes('e')) newW = it.start.w + (isCenter ? dx * 2 : dx);
          if (h.includes('w')) newW = it.start.w - (isCenter ? dx * 2 : dx);
          if (h.includes('s')) newH = it.start.h + (isCenter ? dy * 2 : dy);
          if (h.includes('n')) newH = it.start.h - (isCenter ? dy * 2 : dy);

          if (isProportional) {
             const scaleX = newW / it.start.w;
             const scaleY = newH / it.start.h;
             let scale = 1;
             if (h.length === 2) scale = Math.max(scaleX, scaleY);
             else if (h === 'e' || h === 'w') scale = scaleX;
             else scale = scaleY;

             newW = it.start.w * scale;
             newH = it.start.h * scale;
          }

          if (newW < MIN_SIZE_MM) { newW = MIN_SIZE_MM; if (isProportional) newH = newW / aspect; }
          if (newH < MIN_SIZE_MM) { newH = MIN_SIZE_MM; if (isProportional) newW = newH * aspect; }

          if (isCenter) {
             newX = cx - newW / 2;
             newY = cy - newH / 2;
          } else {
             if (h.includes('w')) newX = it.start.x + (it.start.w - newW);
             if (h.includes('n')) newY = it.start.y + (it.start.h - newH);
             
             if (isProportional) {
                if (h === 'n' || h === 's') newX = cx - newW / 2;
                if (h === 'e' || h === 'w') newY = cy - newH / 2;
             }
          }
          
          let box = { x: newX, y: newY, w: newW, h: newH };
