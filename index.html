          if (snapOn && !it.start.rot && !isCropping && !isProportional) { 
             const s = computeResizeSnap(box, h, others, poster, zoom); 
             box = { x: s.x, y: s.y, w: s.w, h: s.h }; 
             setGuides(s.guides); 
          } else {
             setGuides([]);
          }

          if (isCropping) {
              const ix = it.start.imgX ?? it.start.x;
              const iy = it.start.imgY ?? it.start.y;
              const iw = it.start.imgW ?? it.start.w;
              const ih = it.start.imgH ?? it.start.h;
              
              if (box.x < ix) { box.w -= (ix - box.x); box.x = ix; }
              if (box.y < iy) { box.h -= (iy - box.y); box.y = iy; }
              if (box.x + box.w > ix + iw) { box.w = (ix + iw) - box.x; }
              if (box.y + box.h > iy + ih) { box.h = (iy + ih) - box.y; }
              if (box.w < MIN_SIZE_MM) box.w = MIN_SIZE_MM;
              if (box.h < MIN_SIZE_MM) box.h = MIN_SIZE_MM;
          }

          box.x = clamp(box.x, 0, poster.w - MIN_SIZE_MM);
          box.y = clamp(box.y, 0, poster.h - MIN_SIZE_MM);
          box.w = clamp(box.w, MIN_SIZE_MM, poster.w - box.x);
          box.h = clamp(box.h, MIN_SIZE_MM, poster.h - box.y);

          setElements((p) => p.map((el) => {
            if (el.id !== it.id) return el;
            let newProps = { ...el, ...roundBox(box) };
            if (el.type === 'path') {
              const sx = box.w / it.start.w, sy = box.h / it.start.h;
              newProps.points = it.startPoints.map((pt) => ({ x: box.x + (pt.x - it.start.x) * sx, y: box.y + (pt.y - it.start.y) * sy }));
            }
            if (el.type === 'image') {
               if (isCropping) {
                  newProps.imgX = it.start.imgX ?? it.start.x;
                  newProps.imgY = it.start.imgY ?? it.start.y;
                  newProps.imgW = it.start.imgW ?? it.start.w;
                  newProps.imgH = it.start.imgH ?? it.start.h;
               } else {
                  const sx = box.w / it.start.w, sy = box.h / it.start.h;
                  newProps.imgW = (it.start.imgW ?? it.start.w) * sx;
                  newProps.imgH = (it.start.imgH ?? it.start.h) * sy;
                  newProps.imgX = box.x + ((it.start.imgX ?? it.start.x) - it.start.x) * sx;
                  newProps.imgY = box.y + ((it.start.imgY ?? it.start.y) - it.start.y) * sy;
               }
            }
            return newProps;
          }));
        } 
        else if (it.kind === 'crop-move') {
          it.hasChanged = true;
          const dx = (e.clientX - it.startClientX) / zoom;
          const dy = (e.clientY - it.startClientY) / zoom;
          
          let newImgX = (it.start.imgX ?? it.start.x) + dx;
          let newImgY = (it.start.imgY ?? it.start.y) + dy;
          const imgW = it.start.imgW ?? it.start.w;
          const imgH = it.start.imgH ?? it.start.h;

          if (newImgX > it.start.x) newImgX = it.start.x;
          if (newImgX + imgW < it.start.x + it.start.w) newImgX = it.start.x + it.start.w - imgW;
          if (newImgY > it.start.y) newImgY = it.start.y;
          if (newImgY + imgH < it.start.y + it.start.h) newImgY = it.start.y + it.start.h - imgH;

          setElements(p => p.map(el => el.id === it.id ? { ...el, imgX: newImgX, imgY: newImgY } : el));
        }
        else if (it.kind === 'move-connector' || it.kind === 'endpoint') {
           it.hasChanged = true;
           if (it.kind === 'endpoint') {
             const p = toPoster(e.clientX, e.clientY);
             const hit = (freeArrows || e.altKey) ? null : elementAt(p.x, p.y, elements, null);
             setHoverStitch(hit ? hit.id : null);
             setElements((prev) => prev.map((el) => el.id === it.id ? { ...el, [it.which]: hit ? { elId: hit.id, anchor: 'auto', x: p.x, y: p.y } : { elId: null, anchor: 'auto', x: p.x, y: p.y } } : el));
           } else {
             const dx = (e.clientX - it.startClientX) / zoom, dy = (e.clientY - it.startClientY) / zoom;
             setElements((p) => p.map((el) => {
               if (el.id !== it.id) return el;
               const s = { ...it.start.start }, en = { ...it.start.end };
               if (s.elId == null) { s.x += dx; s.y += dy; }
               if (en.elId == null) { en.x += dx; en.y += dy; }
               return { ...el, start: s, end: en };
             }));
           }
        }
        else if (it.kind === 'draw-connector') {
          const p = toPoster(e.clientX, e.clientY);
          const hit = (freeArrows || e.altKey) ? null : elementAt(p.x, p.y, elements, it.start.elId);
          setHoverStitch(hit ? hit.id : null);
          const end = hit ? { elId: hit.id, anchor: 'auto', x: p.x, y: p.y } : { elId: null, anchor: 'auto', x: p.x, y: p.y };
          it.curEnd = end;
          setDraft({ kind: 'connector', variant: pendingVariant, start: it.start, end });
        } 
        else if (it.kind === 'draw-pen') {
          const p = toPoster(e.clientX, e.clientY);
          it.points.push(p); setDraft({ kind: 'pen', points: it.points.slice() });
        }
      };

      const endInteraction = (e) => {
        const it = interaction.current;
        if (!it || it.pointerId !== e.pointerId) return;

        if (it.kind === 'marquee') {
          const rx = Math.min(it.startX, it.curX), ry = Math.min(it.startY, it.curY);
          const rw = Math.abs(it.startX - it.curX), rh = Math.abs(it.startY - it.curY);
          
          const hits = elements.filter(el => {
            if (isBox(el)) {
              return el.x < rx + rw && el.x + el.w > rx && el.y < ry + rh && el.y + el.h > ry;
            }
            if (el.type === 'connector') {
              const { A, B } = resolveConnector(el, byId);
              const minX = Math.min(A.x, B.x) - 10, maxX = Math.max(A.x, B.x) + 10;
              const minY = Math.min(A.y, B.y) - 10, maxY = Math.max(A.y, B.y) + 10;
              return minX < rx + rw && maxX > rx && minY < ry + rh && maxY > ry;
            }
            if (el.type === 'path') {
              return el.x < rx + rw && el.x + el.w > rx && el.y < ry + rh && el.y + el.h > ry;
            }
            return false;
          }).map(el => el.id);

          let newSelected = it.append ? new Set(selectedIds) : new Set();
          hits.forEach(id => newSelected.add(id));
          setSelectedIds(newSelected); setDraft(null);
        }
        else if (it.kind === 'crop-move') {
          if (!it.hasChanged) setEditingId(null);
          else commit(it.startElements);
        }
        else if (it.kind === 'draw-connector') {
          const { start, curEnd } = it;
          const A = start, B = curEnd || start;
          if (Math.hypot((B.x ?? 0) - (A.x ?? 0), (B.y ?? 0) - (A.y ?? 0)) > 6 || A.elId != null || B.elId != null) {
            commit(it.startElements);
            const id = uid();
            setElements((p) => [...p, { id, type: 'connector', variant: pendingVariant, start: A, end: B, stroke: '#0f172a', strokeWidth: 3, dashed: variantByKey[pendingVariant].dashed }]);
            setSelectedIds(new Set([id]));
          }
          setDraft(null); setTool('select');
        } 
        else if (it.kind === 'draw-pen') {
          if (it.points.length > 1) {
            commit(it.startElements);
            const xs = it.points.map((p) => p.x), ys = it.points.map((p) => p.y);
            const x = Math.min(...xs), y = Math.min(...ys);
            const w = Math.max(...xs) - x || 1, h = Math.max(...ys) - y || 1;
            const id = uid();
            setElements((p) => [...p, { id, type: 'path', points: it.points, x, y, w, h, stroke: '#0f172a', strokeWidth: 3 }]);
            setSelectedIds(new Set([id]));
          }
          setDraft(null); 
        }
        else if (['move', 'resize', 'rotate', 'endpoint', 'move-connector'].includes(it.kind)) {
          if (it.hasChanged) commit(it.startElements);
        }
        interaction.current = null; setGuides([]); setHoverStitch(null); setRotSnap(null);
      };

      const t = dark
        ? { app:'bg-slate-950 text-slate-200', rail:'bg-slate-900 border-slate-800', panel:'bg-slate-900 border-slate-800', sub:'text-slate-400', input:'bg-slate-800 border-slate-700 text-slate-100', hover:'hover:bg-slate-800', chip:'bg-slate-800 border-slate-700', stage:'bg-slate-950' }

      return (
        <div className={`w-full h-screen flex flex-col overflow-hidden select-none ${t.app}`} style={{ fontFamily: 'ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif' }}>

              <div className="w-12 text-center text-xs tabular-nums">{Math.round(zoom * 100)}%</div>

            <button onClick={() => projectInputRef.current?.click()} title="Open a saved .json project"
              className={`h-9 px-3 rounded-lg border text-sm flex items-center gap-1.5 ${t.chip} ${t.hover}`}>Open</button>
            <button onClick={saveProject} title="Save this poster as a .json project file"
              className={`h-9 px-3 rounded-lg border text-sm flex items-center gap-1.5 ${t.chip} ${t.hover}`}>Save</button>
            <button onClick={() => setShowGrid(g => !g)} title="Toggle grid" className={`h-9 px-3 rounded-lg border text-sm flex items-center gap-1.5 ${t.chip} ${t.hover} ${showGrid ? 'text-cyan-400' : t.sub}`}><Ruler size={14} /> Grid</button>
            <button onClick={() => setSnapOn((s) => !s)} title="Toggle snapping" className={`h-9 px-3 rounded-lg border text-sm flex items-center gap-1.5 ${t.chip} ${t.hover} ${snapOn ? 'text-cyan-400' : t.sub}`}><Magnet size={14} /> Snap</button>
            <button onClick={() => setDark((d) => !d)} className={`h-9 w-9 grid place-items-center rounded-lg border ${t.chip} ${t.hover}`}>{dark ? <Sun size={15} /> : <Moon size={15} />}</button>
            <button onClick={() => { setExportState(null); setExportOpen(true); }} disabled={exportState?.busy}

            </button>
          </header>

          <div className="flex flex-1 min-h-0 relative">
            {/* Left Toolbar */}
            <nav className={`w-16 shrink-0 border-r flex flex-col items-center py-3 gap-1 z-10 ${t.rail}`}>

              <div className="my-1 h-px w-8 bg-current opacity-10" />

              <FlyoutTool icon={LayoutTemplate} label="Section" theme={t} active={false} open={menu === 'section'} onEnter={() => setMenu('section')} onLeave={() => setMenu(null)}>

                      <div className="grid grid-cols-1 gap-0.5">

              <FlyoutTool icon={ARROW_VARIANTS.find((v) => v.key === pendingVariant)?.icon || ArrowRight} label="Arrow / connector" theme={t} active={tool === 'connector'} open={menu === 'arrow'} onEnter={() => setMenu('arrow')} onLeave={() => setMenu(null)}>

                <div className="grid grid-cols-1 gap-0.5">
                  {ARROW_VARIANTS.map((v) => (

              </FlyoutTool>

              <button title="Pen" onClick={() => { setTool(tool === 'pen' ? 'select' : 'pen'); setMenu(null); }} className={`h-11 w-11 grid place-items-center rounded-xl ${tool === 'pen' ? 'bg-cyan-500/10 text-cyan-400' : t.hover}`}><PenTool size={19} /></button>
              
              <label className="cursor-pointer">

            {/* Canvas Container */}
            <main id="workspace-bg" ref={viewportRef} className={`flex-1 min-w-0 overflow-auto relative ${t.stage} print:overflow-visible print:bg-white`}
              onDragOver={onCanvasDragOver} onDragLeave={onCanvasDragLeave} onDrop={onCanvasDrop}
              onPointerDown={(e) => {
                if (e.target.id === 'workspace-bg' || e.target.id === 'workspace-center') {
                   if (tool !== 'select') {
                      setTool('select');
                      setDraft(null);
                      setMenu(null);
                   } else if (!e.ctrlKey && !e.metaKey) {
                      setSelectedIds(new Set());
                      // Always drop out of editing — a stuck editingId was what
                      // made tables impossible to deselect and killed undo.
                      setEditingId(null);
                      setEditTarget('body');
                      setMenu(null);
                   }
                }
                if (e.button === 1) { 
                  e.preventDefault(); panRef.current = { x: e.clientX, y: e.clientY, sl: viewportRef.current.scrollLeft, st: viewportRef.current.scrollTop }; setIsPanning(true);
                } else if (e.button === 0 && tool === 'select') {
                  if (e.target.id === 'workspace-bg' || e.target.id === 'workspace-center') {
                    e.currentTarget.setPointerCapture?.(e.pointerId);
                    const p = toPoster(e.clientX, e.clientY);
                    interaction.current = { kind: 'marquee', pointerId: e.pointerId, startX: p.x, startY: p.y, curX: p.x, curY: p.y, append: e.ctrlKey || e.metaKey };
                  }
                }
              }}
              onPointerMove={(e) => {
                if (panRef.current) {
                  viewportRef.current.scrollLeft = panRef.current.sl - (e.clientX - panRef.current.x);
                  viewportRef.current.scrollTop = panRef.current.st - (e.clientY - panRef.current.y); return;
                }
                handlePointerMove(e);
              }}
              onPointerUp={(e) => { if (panRef.current) { panRef.current = null; setIsPanning(false); return; } endInteraction(e); }}
              onPointerCancel={(e) => { if (panRef.current) { panRef.current = null; setIsPanning(false); return; } endInteraction(e); }}
              onWheel={(e) => {
                if (editingId && selected?.type === 'image' && tool === 'select') {
                  e.stopPropagation(); e.preventDefault();
                  const dz = e.deltaY > 0 ? 0.9 : 1.1; 
                  
                  let newW = (selected.imgW ?? selected.w) * dz;
                  let newH = (selected.imgH ?? selected.h) * dz;
                  let newX = selected.x + ((selected.imgX ?? selected.x) - selected.x) * dz - ((selected.imgW ?? selected.w) * (dz - 1)) / 2;
                  let newY = selected.y + ((selected.imgY ?? selected.y) - selected.y) * dz - ((selected.imgH ?? selected.h) * (dz - 1)) / 2;

                  if (newW < selected.w) { const scale = selected.w / newW; newW *= scale; newH *= scale; }
                  if (newH < selected.h) { const scale = selected.h / newH; newW *= scale; newH *= scale; }

                  if (newX > selected.x) newX = selected.x;
                  if (newX + newW < selected.x + selected.w) newX = selected.x + selected.w - newW;
                  if (newY > selected.y) newY = selected.y;
                  if (newY + newH < selected.y + selected.h) newY = selected.y + selected.h - newH;

                  patchSelected({ imgW: newW, imgH: newH, imgX: newX, imgY: newY });
                }
              }}
              style={{ cursor: isPanning ? 'grabbing' : canvasCursor, backgroundImage: dark && !exportState?.busy ? 'radial-gradient(circle at 1px 1px, rgba(148,163,184,0.10) 1px, transparent 0)' : !exportState?.busy ? 'radial-gradient(circle at 1px 1px, rgba(100,116,139,0.18) 1px, transparent 0)' : 'none', backgroundSize: '22px 22px' }}>
              
              <div id="workspace-center" className="min-w-full min-h-full flex items-center justify-center p-8 print:p-0">
                <div className="relative" style={{ width: poster.w * zoom, height: poster.h * zoom, pointerEvents: 'none' }}>
                  <div ref={surfaceRef} className="absolute top-0 left-0 bg-white shadow-2xl print:shadow-none"
                    style={{ width: poster.w, height: poster.h, transform: `scale(${zoom})`, transformOrigin: 'top left', pointerEvents: 'auto' }}
                    onPointerDown={onSurfacePointerDown}>

                    {elements.filter(isBox).map((el) => (
                      <ElementView key={el.id} el={el} selected={selectedIds.has(el.id)} editing={el.id === editingId}
                        editTarget={el.id === editingId ? editTarget : null} stitchTarget={hoverStitch === el.id}
                        onPointerDown={(e) => beginMove(e, el)} onSelect={() => setSelectedIds(new Set([el.id]))}
                        onStartEdit={() => { setEditTarget('body'); setEditingId(el.id); }}
                        onStartEditTitle={() => { setEditTarget('title'); setEditingId(el.id); setSelectedIds(new Set([el.id])); }}
                        onCommitText={(f, v) => commitEdit(el.id, f, v)}
                        onEndEdit={() => { setEditingId(null); setEditTarget('body'); }}
                        onCropMove={(e) => beginCropMove(e, el)}
                        onFigureDrop={(file) => attachFigureImage(el.id, file)}
                        onFigureBrowse={() => { figureTargetRef.current = el.id; figureInputRef.current?.click(); }} />
                    ))}

                    <svg className="absolute top-0 left-0" width={poster.w} height={poster.h} style={{ overflow: 'visible', pointerEvents: 'none' }}>
                      {elements.map((el) => {
                        if (el.type === 'connector') {
                          const { A, B } = resolveConnector(el, byId);
                          return <ConnectorView key={el.id} el={el} A={A} B={B} selected={selectedIds.has(el.id)} onSelect={(e) => beginConnectorMove(e, el)} zoom={zoom} />;
                        }
                        if (el.type === 'path') return <PathView key={el.id} el={el} selected={selectedIds.has(el.id)} onPointerDown={(e) => beginMove(e, el)} zoom={zoom} />;
                        return null;
                      })}
                      {draft?.kind === 'connector' && (() => {
                        const { A, B } = resolveConnector(draft, byId);
                        return <ConnectorView el={{ ...draft, stroke: '#06b6d4', strokeWidth: 3 }} A={A} B={B} draft zoom={zoom} />;
                      })()}
                      {draft?.kind === 'pen' && <polyline points={draft.points.map((p) => `${p.x},${p.y}`).join(' ')} fill="none" stroke="#06b6d4" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />}
                      {draft?.kind === 'marquee' && <rect x={draft.x} y={draft.y} width={draft.w} height={draft.h} fill="rgba(6,182,212,0.15)" stroke="#06b6d4" strokeWidth={1.5/zoom} strokeDasharray={`${4/zoom} ${4/zoom}`} style={{ pointerEvents: 'none' }} />}
                    </svg>
                  </div>
                  
                  {showGrid && !exportState?.busy && (
                    <div className="absolute top-0 left-0 pointer-events-none" style={{
                      width: poster.w * zoom, height: poster.h * zoom,
                      backgroundImage: `linear-gradient(to right, rgba(6,182,212,0.22) 0.5px, transparent 0.5px), linear-gradient(to bottom, rgba(6,182,212,0.22) 0.5px, transparent 0.5px)`,
                      backgroundSize: `${gridMm * zoom}px ${gridMm * zoom}px` }} />
                  )}
                  {!exportState?.busy && <GuidesOverlay guides={guides} zoom={zoom} poster={poster} dark={dark} />}
                  
                  {/* Handle Overlays */}
                  {!exportState?.busy && selectedIds.size > 1 && (
                    <MultiSelectOverlay elements={elements} selectedIds={selectedIds} byId={byId} zoom={zoom} />
                  )}
                  {!exportState?.busy && rotSnap && selected && (
                    <RotationReadout el={selected} zoom={zoom} snap={rotSnap} />
                  )}
                  {!exportState?.busy && selected && isBox(selected) && (!editingId || selected.type === 'image') && (
                    <SelectionOverlay el={selected} zoom={zoom} onResizeStart={beginResize} onRotateStart={beginRotate} isCropping={editingId === selected.id} />
                  )}
                  {!exportState?.busy && selected && selected.type === 'connector' && (
                    <ConnectorHandles el={selected} byId={byId} zoom={zoom} onEndpointStart={beginEndpoint} />
                  )}
                </div>
              </div>
              {/* Format toolbar — docked to the workspace, so zoom/pan/rotation
                  can never move it off-screen or under the poster. */}
              {editingId && selected && (selected.type === 'text' || (selected.type === 'section' && selected.sectionKind !== 'table')) && (
                <FormatToolbar t={t} el={selected}
                  onPatch={(patch) => commitEdit(selected.id, Object.keys(patch)[0], Object.values(patch)[0])}
                  onListStyle={applyListStyle} />
              )}
              <input ref={figureInputRef} type="file" accept="image/*" className="hidden"
                onChange={(e) => { const f = e.target.files?.[0]; if (f && figureTargetRef.current) attachFigureImage(figureTargetRef.current, f); e.target.value = ''; }} />
              {dropActive && (
                <div className="absolute inset-0 z-40 pointer-events-none grid place-items-center bg-cyan-500/10 backdrop-blur-[1px]">
                  <div className="px-5 py-3 rounded-xl bg-cyan-500 text-white text-sm font-semibold shadow-2xl flex items-center gap-2 border-2 border-white/40">
                    <ImagePlus size={16} /> Drop images to place them here
                  </div>
                  <div className="absolute inset-3 rounded-2xl border-2 border-dashed border-cyan-400" />
                </div>
              )}
            </main>

            {/* Right Sidebar */}
            <aside className={`w-72 shrink-0 border-l overflow-y-auto z-10 print:hidden ${t.panel}`}>
              <PropertiesPanel theme={t} selected={selected} poster={poster} elements={elements} elementCount={elements.length}
                selectedIds={selectedIds}
                onPatch={patchSelected} onDelete={deleteSelected} onDuplicate={duplicateSelected} onFront={bringToFront}
                customSize={customSize} setCustomSize={setCustomSize} setSizeKey={setSizeKey}
                onAlign={alignSelection} onDistribute={distributeSelection} onMatchSize={matchSize}
                showGrid={showGrid} setShowGrid={setShowGrid} gridMm={gridMm} setGridMm={setGridMm}
                freeArrows={freeArrows} setFreeArrows={setFreeArrows}
                onUnstitch={(which) => patchSelected({ [which]: (() => {
                  const { A, B } = resolveConnector(selected, byId);
                  return { elId: null, anchor: 'auto', x: (which === 'start' ? A.x : B.x), y: (which === 'start' ? A.y : B.y) };
                })() })} />
            </aside>
          </div>
          
          {/* Custom Size Modal */}
          {showCanvasModal && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" onClick={() => setShowCanvasModal(false)}>
              <div className={`w-80 rounded-xl shadow-xl overflow-hidden ${t.panel}`} onClick={e => e.stopPropagation()}>
                <div className="px-4 py-3 border-b flex justify-between items-center" style={{ borderColor: 'rgba(120,120,120,0.15)' }}>
                  <h3 className="font-semibold text-sm">Custom Canvas Size</h3>
                  <button onClick={() => setShowCanvasModal(false)} className={`h-7 w-7 rounded-md grid place-items-center ${t.hover}`}><X size={15} /></button>
                </div>
                <div className="p-4 flex flex-col gap-3">
                  <label className="block">

                    <span className={`text-[10px] mb-1 block ${t.sub}`}>Height (mm)</span>
                    <input type="text" value={modalH} onChange={e => setModalH(e.target.value)} className={`w-full h-9 px-3 rounded-md border text-sm ${t.input}`} />
                  </label>
                  <button onClick={() => {
                      const w = Math.max(100, parseInt(modalW) || 100);
                      const h = Math.max(100, parseInt(modalH) || 100);
                      applyCanvasSizeChange(w, h);
                      setCustomSize({ w, h });
                      setSizeKey('custom');
                      setShowCanvasModal(false);
                    }} 
                    className="mt-2 w-full h-9 rounded-md bg-cyan-500 text-white text-sm font-medium hover:bg-cyan-600">
                    Apply Dimensions
                  </button>
                </div>
              </div>
            </div>
          )}

          {exportOpen && (
            <ExportModal theme={t} state={exportState} poster={poster} sizeKey={sizeKey}
              format={exportFmt} setFormat={setExportFmt} dpi={exportDpi} setDpi={setExportDpi}
              elementCount={elements.length} onRun={runExport} onClose={closeExport} />
          )}

        </div>
      );
    }

    /* ------------------------------ View Logic --------------------------------- */
    function detachAndRemove(prev, id, byId) {
      return prev.filter((e) => e.id !== id).map((e) => {
        if (e.type !== 'connector') return e;
        if (e.start.elId !== id && e.end.elId !== id) return e;
        const { A, B } = resolveConnector(e, byId);
        const c = { ...e };
        if (c.start.elId === id) c.start = { elId: null, anchor: 'auto', x: A.x, y: A.y };
        if (c.end.elId === id)   c.end   = { elId: null, anchor: 'auto', x: B.x, y: B.y };
        return c;
      });
    }
    const roundBox = (b) => ({ x: Math.round(b.x), y: Math.round(b.y), w: Math.round(b.w), h: Math.round(b.h) });


    /* ---------------------------------------------------------------------
       SectionView — one component, many layouts. `sectionKind` selects the
       body renderer and `headerStyle` the title treatment; the two compose
       freely, which is where the layout variety of real posters comes from.
       The export serialiser in buildSVG mirrors these rules exactly.
       ------------------------------------------------------------------- */
    const sectionLines = (el) => String(el.text ?? '').split('\n').filter(l => l.trim() !== '');

    function SectionHeader({ el, pad, onStartEditTitle }) {
      const hs = el.headerStyle || 'bar';
      // The banner draws its own title inside the body (large and centred). Letting
      // SectionHeader draw it too was what produced the duplicate in the corner.
      if (el.sectionKind === 'banner') return null;
      if (hs === 'none' || !el.title) return null;
      const fs = Math.max(8, el.fontSize * 1.35);
      const ta = el.titleAlign || 'left';
      const font = { fontFamily: el.fontFamily || 'sans-serif', fontSize: fs, fontWeight: 700, textAlign: ta };
      const dbl = { onDoubleClick: (e) => { e.stopPropagation(); onStartEditTitle && onStartEditTitle(); }, style: { cursor: 'text' } };
      if (hs === 'bar')
        return <div {...dbl} style={{ background: el.accent, color: '#fff', padding: `${pad * 0.55}px ${pad}px`, cursor: 'text', ...font }}>{el.title}</div>;
      if (hs === 'tab')
        return (
          <div {...dbl} style={{ padding: `${pad * 0.5}px ${pad}px 0`, textAlign: ta, cursor: 'text' }}>
            <span style={{ display: 'inline-block', background: el.accent, color: '#fff', padding: `${pad * 0.35}px ${pad}px`, borderRadius: (el.radius || 0) * 0.8, ...font, textAlign: 'left' }}>{el.title}</span>
          </div>
        );
      if (hs === 'underline')
        return (
          <div {...dbl} style={{ padding: `${pad * 0.6}px ${pad}px ${pad * 0.35}px`, color: el.accent, borderBottom: `${Math.max(1, fs * 0.09)}px solid ${el.accent}`, margin: `0 ${pad}px`, cursor: 'text', ...font }}>{el.title}</div>
        );
      return <div {...dbl} style={{ padding: `${pad * 0.6}px ${pad}px 0`, color: el.accent, cursor: 'text', ...font }}>{el.title}</div>;
    }

    function SectionBody({ el, pad, editing, editTarget, onCommitText, onEndEdit, onStartEditCaption, onFigureDrop, onFigureBrowse }) {
      const kind = el.sectionKind || 'plain';
      const font = { fontFamily: el.fontFamily || 'sans-serif', fontSize: el.fontSize, color: el.color, lineHeight: el.lineHeight, textAlign: el.align };
      const boxStyle = { padding: pad, overflow: 'hidden', flex: 1, minHeight: 0, ...font };
      const baseStyle = { size: el.fontSize, family: el.fontFamily || 'sans-serif', color: el.color, bold: false, italic: false };

      /* ---- Banner: title is the primary editable, authors are secondary ---- */
      if (kind === 'banner') {
        const tFs = el.fontSize * 2.6;
        const titleStyle = { fontSize: tFs, fontWeight: 800, color: el.color, lineHeight: 1.1, textAlign: 'center' };
        if (editing && editTarget === 'title') {
          return (
            <div style={{ ...boxStyle, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
              <RichTextEditor el={el} html={el.titleHtml != null ? el.titleHtml : plainToHtml(el.title)}
                style={{ ...titleStyle, background: 'rgba(255,255,255,0.14)', outline: '2px solid rgba(255,255,255,0.5)', borderRadius: 4 }}
                onCommit={(h) => onCommitText('titleHtml', h)} onEndEdit={onEndEdit} />
            </div>
          );
        }
        if (editing && editTarget === 'body') {
          return (
            <div style={{ ...boxStyle, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
              <div style={titleStyle}>
                <RichTextRender el={{ ...el, html: el.titleHtml, text: el.title, accent: el.color }} baseStyle={{ ...baseStyle, size: tFs, color: el.color }} style={{}} />
              </div>
              <RichTextEditor el={el} html={el.html != null ? el.html : plainToHtml(el.text)}
                style={{ fontSize: el.fontSize * 1.15, color: el.color, textAlign: 'center', marginTop: pad * 0.35, background: 'rgba(255,255,255,0.14)', outline: '2px solid rgba(255,255,255,0.5)', borderRadius: 4 }}
                onCommit={(h) => onCommitText('html', h)} onEndEdit={onEndEdit} />
            </div>
          );
        }
        return (
          <div style={{ ...boxStyle, display: 'flex', flexDirection: 'column', justifyContent: 'center', textAlign: 'center', cursor: 'text' }}>
            <div style={titleStyle}>
              <RichTextRender el={{ ...el, html: el.titleHtml, text: el.title, accent: el.color }} baseStyle={{ ...baseStyle, size: tFs, color: el.color }} style={{}} />
            </div>
            <div style={{ marginTop: pad * 0.35, fontSize: el.fontSize * 1.15, color: el.color, opacity: 0.92 }}>
              <RichTextRender el={{ ...el, accent: el.color }} baseStyle={{ ...baseStyle, size: el.fontSize * 1.15, color: el.color }} style={{}} />
            </div>
          </div>
        );
      }

      /* ---- Figure: caption is its own editable, image area accepts drops ---- */
      if (kind === 'figure') {
        const capH = el.fontSize * el.lineHeight * 2.6;
        return (
          <div style={{ ...boxStyle, display: 'flex', flexDirection: 'column', gap: pad * 0.5 }}>
            <div
              onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect = 'copy'; }}
              onDrop={(e) => {
                if (!e.dataTransfer?.files?.length) return;
                e.preventDefault(); e.stopPropagation();
                onFigureDrop && onFigureDrop(e.dataTransfer.files[0]);
              }}
              style={{ flex: 1, minHeight: 0, background: el.src ? 'transparent' : 'rgba(100,116,139,0.10)',
                       border: el.src ? 'none' : `1px dashed ${el.accent}`, display: 'grid', placeItems: 'center', overflow: 'hidden' }}>
              {el.src
                ? <img src={el.src} alt="" draggable={false} style={{ width: '100%', height: '100%', objectFit: el.fit || 'contain' }} />
                : <span onDoubleClick={(e) => { e.stopPropagation(); onFigureBrowse && onFigureBrowse(); }}
                         style={{ fontSize: el.fontSize * 0.95, color: el.accent, opacity: 0.8, textAlign: 'center', padding: pad, cursor: 'pointer' }}>
                     Drop an image here<br/><span style={{ fontSize: el.fontSize * 0.75 }}>or double-click to browse</span>
                   </span>}
            </div>
            {editing && editTarget !== 'title' ? (
              <RichTextEditor el={el} html={el.html != null ? el.html : plainToHtml(el.text)}
                style={{ ...font, fontSize: el.fontSize * 0.92, minHeight: capH, background: 'rgba(255,255,255,0.55)', outline: `2px solid ${el.accent}`, borderRadius: 3 }}
                onCommit={(h) => onCommitText('html', h)} onEndEdit={onEndEdit} />
            ) : (
              <div style={{ fontSize: el.fontSize * 0.92, maxHeight: capH, overflow: 'hidden', cursor: 'text' }}
                   onDoubleClick={(e) => { e.stopPropagation(); onStartEditCaption && onStartEditCaption(); }}>
                <span style={{ color: el.accent, fontWeight: 700 }}>{el.title ? el.title + '. ' : ''}</span>
                <RichTextRender el={el} baseStyle={{ ...baseStyle, size: el.fontSize * 0.92 }} style={{ display: 'inline' }} />
              </div>
            )}
          </div>
        );
      }

      /* ---- Table: cells are edited in place ---- */
      if (kind === 'table') {
        const rows = el.rows && el.rows.length ? el.rows : [['', '']];
        const setCell = (ri, ci, v) => {
          const next = rows.map((r, i) => i === ri ? r.map((c, j) => j === ci ? v : c) : [...r]);
          onCommitText('rows', next);
        };
        return (
          <div style={{ ...boxStyle, overflow: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: el.fontSize, tableLayout: 'fixed' }}>
              <tbody>
                {rows.map((r, ri) => (
                  <tr key={ri} style={{ background: ri === 0 ? el.accent : (ri % 2 ? 'rgba(100,116,139,0.07)' : 'transparent') }}>
                    {r.map((c, ci) => (
                      <td key={ci} style={{ padding: `${pad * 0.3}px ${pad * 0.4}px`, color: ri === 0 ? '#fff' : el.color,
                                            fontWeight: ri === 0 ? 700 : 400, border: `0.5px solid rgba(100,116,139,0.35)`,
                                            overflow: 'hidden', verticalAlign: 'top' }}>
                        {editing ? (
                          <input value={c}
                            onPointerDown={(e) => e.stopPropagation()}
                            onKeyDown={(e) => { e.stopPropagation(); if (e.key === 'Escape') onEndEdit(); }}
                            onChange={(e) => setCell(ri, ci, e.target.value)}
                            style={{ width: '100%', border: 'none', outline: 'none', background: 'rgba(255,255,255,0.22)',
                                     font: 'inherit', color: 'inherit', fontWeight: 'inherit', padding: 0, borderRadius: 2 }} />
                        ) : (
                          <span style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', display: 'block' }}>{c}</span>
                        )}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      }

      /* ---- Everything else: one rich-text body ---- */
      if (editing) {
        return (
          <RichTextEditor el={el} html={el.html != null ? el.html : plainToHtml(el.text)}
            style={{ ...boxStyle, width: '100%', background: 'rgba(255,255,255,0.55)', outline: `2px solid ${el.accent}`,
                     fontWeight: kind === 'callout' ? 600 : 400, overflow: 'auto' }}
            onCommit={(h) => onCommitText('html', h)} onEndEdit={onEndEdit} />
        );
      }

      if (kind === 'callout') {
        return (
          <div style={{ ...boxStyle, display: 'flex', alignItems: 'center', justifyContent: el.align === 'left' ? 'flex-start' : 'center', fontWeight: 600 }}>
            <RichTextRender el={el} baseStyle={baseStyle} style={{ width: '100%' }} />
          </div>
        );
      }
      return <RichTextRender el={el} baseStyle={baseStyle} style={boxStyle} />;
    }

    function SectionView({ el, base, editing, editTarget, onPointerDown, onStartEdit, onStartEditTitle, onCommitText, onEndEdit, onFigureDrop, onFigureBrowse }) {
      const pad = el.padding ?? 10;
      return (
        <div onPointerDown={onPointerDown} onDoubleClick={onStartEdit}
             style={{ ...base, background: el.fill, borderRadius: el.radius || 0, overflow: 'hidden',
                      display: 'flex', flexDirection: 'column',
                      border: el.borderW ? `${el.borderW}px solid ${el.borderColor || el.accent}` : 'none',
                      boxShadow: shadowCss(el) }}>
          <SectionHeader el={el} pad={pad} onStartEditTitle={onStartEditTitle} />
          <SectionBody el={el} pad={pad} editing={editing} editTarget={editTarget}
                       onCommitText={onCommitText} onEndEdit={onEndEdit}
                       onStartEditCaption={onStartEdit} onFigureDrop={onFigureDrop} onFigureBrowse={onFigureBrowse} />
        </div>
      );
    }

    function ElementView({ el, selected, editing, editTarget, stitchTarget, onPointerDown, onStartEdit, onStartEditTitle, onCommitText, onEndEdit, onCropMove, onFigureDrop, onFigureBrowse }) {
      const base = { position: 'absolute', left: el.x, top: el.y, width: el.w, height: el.h,
                     cursor: el.locked ? 'not-allowed' : (editing && el.type !== 'image' ? 'text' : 'move'),
                     opacity: el.opacity ?? 1,
                     transform: `rotate(${el.rot || 0}deg)` };
      
      if (el.type === 'text') {
        const style = { ...base, padding: 8, fontFamily: el.fontFamily || 'sans-serif', fontSize: el.fontSize, color: el.color, fontWeight: el.bold ? 700 : 400, fontStyle: el.italic ? 'italic' : 'normal', textAlign: el.align, lineHeight: el.lineHeight, background: selected ? 'rgba(6,182,212,0.04)' : 'transparent', overflow: 'hidden', wordBreak: 'break-word' };
        const baseStyle = { size: el.fontSize, family: el.fontFamily || 'sans-serif', color: el.color, bold: !!el.bold, italic: !!el.italic };
        if (editing) {
          return <RichTextEditor el={el} html={el.html != null ? el.html : plainToHtml(el.text)}
                   style={{ ...style, outline: '1px solid #06b6d4', overflow: 'auto' }}
                   onCommit={(h) => onCommitText('html', h)} onEndEdit={onEndEdit} />;
        }
        return <div style={style} onPointerDown={onPointerDown} onDoubleClick={onStartEdit}>
                 <RichTextRender el={el} baseStyle={baseStyle} style={{}} />
               </div>;
      }
      
      if (el.type === 'section') return <SectionView el={el} base={base} editing={editing} editTarget={editTarget} onPointerDown={onPointerDown} onStartEdit={onStartEdit} onStartEditTitle={onStartEditTitle} onCommitText={onCommitText} onEndEdit={onEndEdit} onFigureDrop={onFigureDrop} onFigureBrowse={onFigureBrowse} />;
      
      if (el.type === 'image') {
        if (editing) {
          return (
            <div style={{ ...base, overflow: 'visible', zIndex: 50 }} onPointerDown={onPointerDown}>
              <img src={el.src} onPointerDown={onCropMove} onClick={(e) => { e.stopPropagation(); onEndEdit(); }} draggable={false} 
                   style={{ position: 'absolute', left: (el.imgX ?? el.x) - el.x, top: (el.imgY ?? el.y) - el.y, width: el.imgW ?? el.w, height: el.imgH ?? el.h, cursor: 'move', opacity: 0.35, objectFit: 'fill', maxWidth: 'none', maxHeight: 'none' }} />
              <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none' }}>
                <img src={el.src} style={{ position: 'absolute', left: (el.imgX ?? el.x) - el.x, top: (el.imgY ?? el.y) - el.y, width: el.imgW ?? el.w, height: el.imgH ?? el.h, objectFit: 'fill', maxWidth: 'none', maxHeight: 'none' }} />
              </div>
            </div>
          );
        }
        return (
          <div style={{ ...base, overflow: 'hidden', borderRadius: 4 }} onPointerDown={onPointerDown} onDoubleClick={onStartEdit}>
            <img src={el.src} alt="" draggable={false} 
                 style={{ position: 'absolute', left: (el.imgX ?? el.x) - el.x, top: (el.imgY ?? el.y) - el.y, width: el.imgW ?? el.w, height: el.imgH ?? el.h, objectFit: 'fill', pointerEvents: 'none', maxWidth: 'none', maxHeight: 'none' }} />
          </div>
        );
      }
      
      if (el.type === 'shape') {
        const sw = el.strokeWidth || 0;
        // Inset by half the stroke so the border sits fully inside the box —
        // this is what makes the on-screen bounds match the exported bounds.
        const iw = Math.max(1, el.w - sw), ih = Math.max(1, el.h - sw);
        const d = shapePath(el.shape, iw, ih, el.cornerRadius || 0);
        const open = OPEN_SHAPES.has(el.shape) || el.fill === 'none';
        return (
          <div style={base} onPointerDown={onPointerDown}>
            <svg width={el.w} height={el.h} style={{ display: 'block', overflow: 'visible' }}>
              <g transform={`translate(${sw / 2} ${sw / 2})`}>
                <path d={d} fill={open ? 'none' : el.fill} stroke={el.stroke} strokeWidth={sw}
                      strokeDasharray={el.dashed ? `${sw * 3} ${sw * 2}` : undefined}
                      strokeLinejoin={el.miter === false ? 'round' : 'miter'} strokeLinecap="butt" />
              </g>
            </svg>
          </div>
        );
      }
      return null;
    }

    function connectorPath(A, B, routing) {
      if (routing === 'elbow') { const mx = (A.x + B.x) / 2; return `M ${A.x} ${A.y} L ${mx} ${A.y} L ${mx} ${B.y} L ${B.x} ${B.y}`; }
      if (routing === 'curved') { const dx = (B.x - A.x) * 0.45; return `M ${A.x} ${A.y} C ${A.x + dx} ${A.y}, ${B.x - dx} ${B.y}, ${B.x} ${B.y}`; }
      return `M ${A.x} ${A.y} L ${B.x} ${B.y}`;
    }
    function Head({ id, kind, stroke }) {
      if (kind === 'none') return null;
      const common = { id, markerWidth: 10, markerHeight: 10, orient: 'auto-start-reverse', markerUnits: 'strokeWidth' };
      if (kind === 'triangle') return <marker {...common} refX="7" refY="3.5"><path d="M0,0 L8,3.5 L0,7 Z" fill={stroke} /></marker>;
      if (kind === 'open') return <marker {...common} refX="7" refY="3.5"><path d="M0,0 L8,3.5 L0,7" fill="none" stroke={stroke} strokeWidth="1.4" /></marker>;
      if (kind === 'dot') return <marker {...common} refX="3.5" refY="3.5"><circle cx="3.5" cy="3.5" r="3" fill={stroke} /></marker>;
      return null;
    }
    function ConnectorView({ el, A, B, selected, onSelect, draft, zoom }) {
      const v = variantByKey[el.variant] || variantByKey.arrow;
      const d = connectorPath(A, B, v.routing);
      const sId = `s_${el.id || 'draft'}`, eId = `e_${el.id || 'draft'}`;
      return (
        <g>
          <defs><Head id={sId} kind={v.startHead} stroke={el.stroke} /><Head id={eId} kind={v.endHead} stroke={el.stroke} /></defs>
          {!draft && <path d={d} fill="none" stroke="transparent" strokeWidth={Math.max(el.strokeWidth * 3, 12)} style={{ pointerEvents: 'stroke', cursor: 'move' }} onPointerDown={onSelect} />}
          {selected && <path d={d} fill="none" stroke="#06b6d4" strokeWidth={el.strokeWidth + 4} opacity="0.25" style={{ pointerEvents: 'none' }} />}
          <path d={d} fill="none" stroke={el.stroke} strokeWidth={el.strokeWidth} strokeLinecap="round" strokeDasharray={el.dashed ? '10 7' : undefined} markerStart={v.startHead !== 'none' ? `url(#${sId})` : undefined} markerEnd={v.endHead !== 'none' ? `url(#${eId})` : undefined} style={{ pointerEvents: 'none' }} />
        </g>
      );
    }

    function PathView({ el, selected, onPointerDown }) {
      return (
        <g transform={`rotate(${el.rot || 0} ${el.x + el.w/2} ${el.y + el.h/2})`}>
          <polyline points={el.points.map((p) => `${p.x},${p.y}`).join(' ')} fill="none" stroke="transparent" strokeWidth={Math.max(el.strokeWidth * 3, 12)} style={{ pointerEvents: 'stroke', cursor: 'move' }} onPointerDown={onPointerDown} />
          <polyline points={el.points.map((p) => `${p.x},${p.y}`).join(' ')} fill="none" stroke={el.stroke} strokeWidth={el.strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={{ pointerEvents: 'none' }} />
        </g>
      );
    }

    function GuidesOverlay({ guides, zoom, poster, dark }) {
      const W = poster.w * zoom, H = poster.h * zoom;
      return (
        <svg className="absolute top-0 left-0 pointer-events-none" width={W} height={H} style={{ overflow: 'visible' }}>
          <rect x="0.5" y="0.5" width={W - 1} height={H - 1} fill="none" stroke={dark ? '#334155' : '#cbd5e1'} strokeWidth="1" />
          {guides.map((g, i) => {
            if (g.type === 'align') {
              const isX = g.axis === 'x'; const p = g.pos * zoom, a = g.start * zoom, b = g.end * zoom;
              return <g key={i}><line x1={isX ? p : a} y1={isX ? a : p} x2={isX ? p : b} y2={isX ? b : p} stroke="#ec4899" strokeWidth="1" strokeDasharray="5 4" />{[a, b].map((c, j) => <circle key={j} r="2.5" fill="#ec4899" cx={isX ? p : c} cy={isX ? c : p} />)}</g>;
            }
            return null;
          })}
        </svg>
      );
    }

    const HANDLES = [['nw',0,0],['n',0.5,0],['ne',1,0],['w',0,0.5],['e',1,0.5],['sw',0,1],['s',0.5,1],['se',1,1]];
    const CURSORS = { nw:'nwse-resize', ne:'nesw-resize', sw:'nesw-resize', se:'nwse-resize', n:'ns-resize', s:'ns-resize', e:'ew-resize', w:'ew-resize' };
    
    function SelectionOverlay({ el, zoom, onResizeStart, onRotateStart, isCropping }) {
      const left = el.x * zoom, top = el.y * zoom, w = el.w * zoom, h = el.h * zoom;
      return (
        <div className="absolute pointer-events-none" style={{ left, top, width: w, height: h, transform: `rotate(${el.rot || 0}deg)`, zIndex: 60 }}>
          <div className="absolute inset-0 pointer-events-none" style={{ border: `2px solid ${isCropping ? '#000' : '#06b6d4'}` }} />
          <div className="absolute -top-6 left-0 text-[10px] px-1.5 py-0.5 rounded text-white font-medium tabular-nums whitespace-nowrap shadow-sm" 
               style={{ transform: `rotate(${-(el.rot || 0)}deg)`, transformOrigin: 'top left', backgroundColor: isCropping ? '#000' : '#06b6d4' }}>
            {Math.round(el.w)} × {Math.round(el.h)} mm
          </div>
          
          <div className={`absolute pointer-events-none ${isCropping ? 'bg-black' : 'bg-cyan-500'}`} style={{ width: 1.5, height: 20, left: w / 2 - 0.75, top: -20 }} />
          <div onPointerDown={(e) => onRotateStart(e, el)} className={`absolute bg-white rounded-full shadow-sm flex items-center justify-center ${isCropping ? 'text-black border-black' : 'text-cyan-500 border-cyan-500'}`} 
               style={{ width: 18, height: 18, left: w / 2 - 9, top: -29, borderWidth: 1.5, cursor: 'grab', pointerEvents: 'auto' }}>
            <RotateCw size={10} />
          </div>
          
          {HANDLES.map(([name, fx, fy]) => <div key={name} onPointerDown={(e) => onResizeStart(e, el, name)} className="absolute bg-white rounded-sm shadow" style={{ width: 10, height: 10, left: fx * w - 5, top: fy * h - 5, border: `1.5px solid ${isCropping ? '#000' : '#06b6d4'}`, cursor: CURSORS[name], pointerEvents: 'auto' }} />)}
        </div>
      );
    }


    /* Rendered whenever more than one element is selected: every member gets a
       dashed outline, and the union bounding box is drawn with a live count so
       "Select all" is unmistakably visible. */
    function selectionBounds(elements, selectedIds, byId) {
      let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity, n = 0;
      for (const el of elements) {
        if (!selectedIds.has(el.id)) continue;
        n++;
        if (el.type === 'connector') {
          const { A, B } = resolveConnector(el, byId);
          x0 = Math.min(x0, A.x, B.x); y0 = Math.min(y0, A.y, B.y);
          x1 = Math.max(x1, A.x, B.x); y1 = Math.max(y1, A.y, B.y);
        } else {
          x0 = Math.min(x0, el.x); y0 = Math.min(y0, el.y);
          x1 = Math.max(x1, el.x + el.w); y1 = Math.max(y1, el.y + el.h);
        }
      }
      if (!n || !isFinite(x0)) return null;
      return { x: x0, y: y0, w: x1 - x0, h: y1 - y0, count: n };
    }

    function MultiSelectOverlay({ elements, selectedIds, byId, zoom }) {
      const b = selectionBounds(elements, selectedIds, byId);
      if (!b) return null;
      return (
        <div className="absolute top-0 left-0 pointer-events-none" style={{ zIndex: 55, width: '100%', height: '100%' }}>
          {elements.filter((el) => selectedIds.has(el.id) && isBox(el)).map((el) => (
            <div key={el.id} className="absolute" style={{
              left: el.x * zoom, top: el.y * zoom, width: el.w * zoom, height: el.h * zoom,
              transform: `rotate(${el.rot || 0}deg)`,
              border: '1.5px dashed #06b6d4', background: 'rgba(6,182,212,0.09)', borderRadius: 2 }} />
          ))}
          <div className="absolute" style={{
            left: b.x * zoom - 4, top: b.y * zoom - 4, width: b.w * zoom + 8, height: b.h * zoom + 8,
            border: '2px solid #06b6d4', borderRadius: 3, boxShadow: '0 0 0 9999px rgba(6,182,212,0.045)' }} />
          <div className="absolute text-[11px] px-2 py-0.5 rounded-full bg-cyan-500 text-white font-semibold shadow whitespace-nowrap"
               style={{ left: b.x * zoom - 4, top: b.y * zoom - 28 }}>
            {b.count} selected
          </div>
          {[[0, 0], [1, 0], [0, 1], [1, 1]].map(([fx, fy], i) => (
            <div key={i} className="absolute bg-cyan-500 rounded-sm" style={{
              width: 8, height: 8, left: (b.x + fx * b.w) * zoom - 4 + (fx ? 4 : -4), top: (b.y + fy * b.h) * zoom - 4 + (fy ? 4 : -4) }} />
          ))}
        </div>
      );
    }

    /* Live angle readout while rotating; turns solid when a detent is captured. */
    function RotationReadout({ el, zoom, snap }) {
      const cx = (el.x + el.w / 2) * zoom, cy = (el.y + el.h / 2) * zoom;
      const hard = snap.hard;
      const a = ((el.rot || 0) % 360 + 360) % 360;
      const cardinal = hard ? (a % 180 === 0 ? 'horizontal' : 'vertical') : null;
      return (
        <div className="absolute pointer-events-none" style={{ zIndex: 70, left: 0, top: 0 }}>
          <svg className="absolute" style={{ left: cx - 200, top: cy - 200, overflow: 'visible' }} width="400" height="400">
            {hard && <>
              <line x1="0" y1="200" x2="400" y2="200" stroke="#ec4899" strokeWidth="1" strokeDasharray="6 5" opacity={a % 180 === 0 ? 1 : 0.25} />
              <line x1="200" y1="0" x2="200" y2="400" stroke="#ec4899" strokeWidth="1" strokeDasharray="6 5" opacity={a % 180 === 90 ? 1 : 0.25} />
            </>}
          </svg>
          <div className="absolute text-[11px] px-2 py-0.5 rounded font-semibold text-white shadow tabular-nums whitespace-nowrap"
               style={{ left: cx + 14, top: cy - 10, background: hard ? '#ec4899' : '#06b6d4' }}>
            {Math.round(a)}°{cardinal ? ` · ${cardinal}` : ''}
          </div>
        </div>
      );
    }

    function ConnectorHandles({ el, byId, zoom, onEndpointStart }) {
      const { A, B } = resolveConnector(el, byId);
      const dot = (pt, which, stitched) => <div onPointerDown={(e) => onEndpointStart(e, el, which)} className="absolute rounded-full shadow" style={{ width: 14, height: 14, left: pt.x * zoom - 7, top: pt.y * zoom - 7, border: '2px solid #06b6d4', background: stitched ? '#06b6d4' : '#fff', cursor: 'grab', pointerEvents: 'auto' }} />;
      return <div className="absolute top-0 left-0 pointer-events-none" style={{ width: '100%', height: '100%', zIndex: 60 }}>{dot(A, 'start', el.start.elId != null)}{dot(B, 'end', el.end.elId != null)}</div>;
    }

    function Group({ t, title, children }) { return <div className="px-4 py-3 border-b" style={{ borderColor: 'rgba(120,120,120,0.12)' }}><div className={`text-[11px] uppercase tracking-[0.15em] mb-2.5 ${t.sub}`}>{title}</div>{children}</div>; }

    function AlignGlyph({ mode }) {
      const S = 14;
      const bar = (x, y, w, h, o) => <rect key={`${x}-${y}`} x={x} y={y} width={w} height={h} rx="0.6" fill="currentColor" opacity={o} />;
      const guide = (x1, y1, x2, y2) => <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="currentColor" strokeWidth="1" opacity="0.95" />;
      let body = null;
      switch (mode) {
        case 'left':     body = <>{guide(2,1,2,13)}{bar(3,3,8,3,0.85)}{bar(3,8,5,3,0.55)}</>; break;
        case 'hcenter':  body = <>{guide(7,1,7,13)}{bar(2,3,10,3,0.85)}{bar(4,8,6,3,0.55)}</>; break;
        case 'right':    body = <>{guide(12,1,12,13)}{bar(3,3,8,3,0.85)}{bar(6,8,5,3,0.55)}</>; break;
        case 'top':      body = <>{guide(1,2,13,2)}{bar(3,3,3,8,0.85)}{bar(8,3,3,5,0.55)}</>; break;
        case 'vcenter':  body = <>{guide(1,7,13,7)}{bar(3,2,3,10,0.85)}{bar(8,4,3,6,0.55)}</>; break;
        case 'bottom':   body = <>{guide(1,12,13,12)}{bar(3,3,3,8,0.85)}{bar(8,6,3,5,0.55)}</>; break;
        case 'distx':    body = <>{bar(1,3,3,8,0.85)}{bar(5.5,3,3,8,0.55)}{bar(10,3,3,8,0.85)}</>; break;
        case 'disty':    body = <>{bar(3,1,8,3,0.85)}{bar(3,5.5,8,3,0.55)}{bar(3,10,8,3,0.85)}</>; break;
        default: body = null;
      }
      return <svg width={S} height={S} viewBox="0 0 14 14" style={{ display: 'block' }}>{body}</svg>;
    }

    function AlignTools({ t, onAlign, onDistribute, onMatchSize, count }) {
      const canDistribute = count >= 3;
      const canMatch = count >= 2;
      const Btn = ({ title, disabled, onClick, children }) => (
        <button title={title} disabled={disabled} onClick={onClick}
          className={`h-8 rounded-md border flex items-center justify-center ${t.hover} ${disabled ? 'opacity-30 cursor-not-allowed' : ''}`}>
          {children}
        </button>
      );
      return (
        <div className={`rounded-lg border p-3 ${t.chip}`}>
          <div className={`text-[10px] uppercase tracking-[0.15em] mb-2 ${t.sub}`}>Align</div>
          <div className="grid grid-cols-6 gap-1.5">
            <Btn title="Align left" onClick={() => onAlign('left')}><AlignGlyph mode="left" /></Btn>
            <Btn title="Align horizontal centres" onClick={() => onAlign('hcenter')}><AlignGlyph mode="hcenter" /></Btn>
            <Btn title="Align right" onClick={() => onAlign('right')}><AlignGlyph mode="right" /></Btn>
            <Btn title="Align top" onClick={() => onAlign('top')}><AlignGlyph mode="top" /></Btn>
            <Btn title="Align vertical centres" onClick={() => onAlign('vcenter')}><AlignGlyph mode="vcenter" /></Btn>
            <Btn title="Align bottom" onClick={() => onAlign('bottom')}><AlignGlyph mode="bottom" /></Btn>
          </div>

          <div className={`text-[10px] uppercase tracking-[0.15em] mt-3 mb-2 ${t.sub}`}>Distribute</div>
          <div className="grid grid-cols-2 gap-1.5">
            <Btn title={canDistribute ? 'Distribute horizontally' : 'Needs 3 or more items'} disabled={!canDistribute} onClick={() => onDistribute('x')}><AlignGlyph mode="distx" /></Btn>
            <Btn title={canDistribute ? 'Distribute vertically' : 'Needs 3 or more items'} disabled={!canDistribute} onClick={() => onDistribute('y')}><AlignGlyph mode="disty" /></Btn>
          </div>

          <div className={`text-[10px] uppercase tracking-[0.15em] mt-3 mb-2 ${t.sub}`}>Match size</div>
          <div className="grid grid-cols-3 gap-1.5">
            <button disabled={!canMatch} onClick={() => onMatchSize('w')} className={`h-8 rounded-md border text-[11px] ${t.hover} ${!canMatch ? 'opacity-30 cursor-not-allowed' : ''}`}>Width</button>
            <button disabled={!canMatch} onClick={() => onMatchSize('h')} className={`h-8 rounded-md border text-[11px] ${t.hover} ${!canMatch ? 'opacity-30 cursor-not-allowed' : ''}`}>Height</button>

          </div>
          <div className={`text-[10px] mt-2 leading-relaxed ${t.sub}`}>Sizes are matched to the largest item in the selection.</div>
        </div>
      );
