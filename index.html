    /* Menu previews rendered from the same path generator as the canvas, so
       what you pick is exactly what you get. */
    function ShapeGlyph({ preset, size = 22 }) {
      const w = size, h = size * (preset.h / preset.w > 1.4 ? 1 : preset.h / preset.w);
      const sw = 1.6;
      const d = shapePath(preset.key === 'rect-round' ? 'rect' : preset.key, w - sw, h - sw,
                          preset.cornerRadius ? (preset.cornerRadius / preset.w) * w : 0);
      const open = OPEN_SHAPES.has(preset.key);
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <g transform={`translate(${sw / 2} ${(size - h) / 2 + sw / 2})`}>
            <path d={d} fill={open ? 'none' : 'currentColor'} fillOpacity="0.18" stroke="currentColor" strokeWidth={sw} strokeLinejoin="round" />
          </g>
        </svg>
      );
    }

    function SectionGlyph({ preset, size = 18 }) {
      const k = preset.kind || 'plain';
      const a = preset.accent;
      const line = (y, w = 12, o = 0.45) => <rect key={y} x="3" y={y} width={w} height="1.4" rx="0.7" fill="currentColor" opacity={o} />;
      return (
        <svg width={size} height={size} viewBox="0 0 18 18" className="shrink-0">
          <rect x="1" y="1" width="16" height="16" rx="2" fill={preset.fill} stroke={a} strokeWidth="0.8" />
          {k === 'banner' && <><rect x="3" y="5" width="12" height="3" rx="1" fill={a} />{line(10, 8, 0.35)}</>}
          {k === 'plain' && <><rect x="1" y="1" width="16" height="4" rx="1" fill={a} />{line(8)}{line(11)}{line(14, 8)}</>}
          {(k === 'bullets' || k === 'numbered') && <><rect x="1" y="1" width="16" height="3.5" rx="1" fill={a} />
            {[7, 10.5, 14].map((y) => <g key={y}><circle cx="4" cy={y} r="0.9" fill={a} /><rect x="6" y={y - 0.7} width="8" height="1.4" rx="0.7" fill="currentColor" opacity="0.4" /></g>)}</>}
          {k === 'twocol' && <><rect x="1" y="1" width="16" height="3.5" rx="1" fill={a} />
            {[7, 9.5, 12, 14.5].map((y) => <g key={y}><rect x="3" y={y} width="5.5" height="1.2" rx="0.6" fill="currentColor" opacity="0.4" /><rect x="9.5" y={y} width="5.5" height="1.2" rx="0.6" fill="currentColor" opacity="0.4" /></g>)}</>}
          {k === 'figure' && <><rect x="3" y="3" width="12" height="8" rx="1" fill={a} opacity="0.3" stroke={a} strokeWidth="0.6" />{line(13, 12, 0.4)}</>}
          {k === 'table' && <><rect x="2.5" y="3" width="13" height="3" fill={a} />
            {[6, 9, 12].map((y) => <rect key={y} x="2.5" y={y} width="13" height="3" fill="none" stroke={a} strokeWidth="0.5" opacity="0.5" />)}
            <line x1="9" y1="3" x2="9" y2="15" stroke={a} strokeWidth="0.5" opacity="0.5" /></>}
          {k === 'callout' && <><rect x="1" y="1" width="2" height="16" fill={a} />{line(7, 11, 0.55)}{line(10.5, 9, 0.55)}</>}
          {k === 'contact' && <><circle cx="5" cy="6" r="2" fill={a} />{line(10)}{line(13, 8)}</>}
          {k === 'footer' && <><rect x="1" y="1" width="16" height="16" rx="2" fill={a} />
            {[6, 9, 12].map((y) => <rect key={y} x="3" y={y} width="12" height="1.1" rx="0.5" fill="#fff" opacity="0.6" />)}</>}
        </svg>
      );
    }

    function ExportModal({ theme: t, state, poster, sizeKey, format, setFormat, dpi, setDpi, elementCount, onRun, onClose }) {
      const raster = format === 'png' || format === 'jpg';
      const plan = raster ? rasterPlan(poster, dpi) : null;
      const busy = state?.busy;
      const result = state?.result;
      const inches = (mm) => (mm / 25.4).toFixed(1);

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" onClick={busy ? undefined : onClose}>
          <div onClick={(e) => e.stopPropagation()} className={`w-[480px] max-w-[94vw] rounded-2xl border shadow-2xl overflow-hidden ${t.panel}`}>
            <div className="px-5 py-4 flex items-center justify-between border-b" style={{ borderColor: 'rgba(120,120,120,0.15)' }}>
              <div className="flex items-center gap-2 font-semibold"><Download size={16} className="text-cyan-400" /> Export poster</div>
              <button onClick={onClose} disabled={busy} className={`h-7 w-7 grid place-items-center rounded-md disabled:opacity-40 ${t.hover}`}><X size={15} /></button>
            </div>

            <div className="px-5 py-4">
              <div className={`text-xs mb-3 ${t.sub}`}>
                {sizeKey} · {poster.w} × {poster.h} mm ({inches(poster.w)}″ × {inches(poster.h)}″) · {elementCount} element{elementCount === 1 ? '' : 's'}
              </div>

              <div className="grid grid-cols-2 gap-2">
                {EXPORT_FORMATS.map((f) => {
                  const active = format === f.key;
                  return (
                    <button key={f.key} onClick={() => setFormat(f.key)} disabled={busy}
                      className={`text-left px-3 py-2.5 rounded-lg border transition disabled:opacity-50 ${active ? 'border-cyan-500 bg-cyan-500/10' : `${t.chip} ${t.hover}`}`}>
                      <div className="flex items-center gap-2 text-sm font-semibold">
                        <f.icon size={14} className={active ? 'text-cyan-400' : t.sub} />{f.label}
                        {active && <Check size={13} className="text-cyan-400 ml-auto" />}
                      </div>
                      <div className={`text-[10.5px] leading-snug mt-1 ${t.sub}`}>{f.hint}</div>
                    </button>
                  );
                })}
              </div>

              {raster && (
                <div className="mt-4">
                  <div className={`text-[11px] uppercase tracking-[0.15em] mb-2 ${t.sub}`}>Resolution</div>
                  <div className={`flex rounded-lg border overflow-hidden ${t.chip}`}>
                    {DPI_OPTIONS.map((d) => (
                      <button key={d} onClick={() => setDpi(d)} disabled={busy}
                        className={`flex-1 h-9 text-xs font-medium transition ${dpi === d ? 'bg-cyan-500 text-white' : t.hover}`}>{d} DPI</button>
                    ))}
                  </div>
                  <div className={`text-[11px] mt-2 tabular-nums ${t.sub}`}>
                    Output: {plan.w.toLocaleString()} × {plan.h.toLocaleString()} px
                    {plan.clamped && <span className="text-amber-400"> · capped by the browser canvas limit (effective {plan.dpi} DPI). Use PDF or SVG for full print resolution.</span>}
                  </div>
                </div>
              )}

              {format === 'pdf' && (
                <div className={`text-[11px] mt-4 leading-relaxed ${t.sub}`}>
                  Geometry and type stay as vectors, so the PDF is resolution-independent — a 300 DPI RIP and a 1200 DPI plotter both print it sharp. Page box is set to the exact poster dimensions, no scaling or crop.
                </div>
              )}

              {(busy || result) && (
                <div className="mt-4 p-3 rounded-lg text-sm flex items-start gap-2"
                     style={{ background: result && !result.ok ? 'rgba(244,63,94,0.12)' : 'rgba(6,182,212,0.10)' }}>
                  {busy ? <Loader2 size={16} className="text-cyan-400 mt-0.5 shrink-0 animate-spin" />
                        : result.ok ? <Check size={16} className="text-cyan-400 mt-0.5 shrink-0" />
                        : <X size={16} className="text-rose-400 mt-0.5 shrink-0" />}
                  <div>
                    <div className="font-medium">{busy ? 'Building your file…' : result.ok ? 'Export complete' : 'Export failed'}</div>
                    {!busy && <div className={`text-xs mt-0.5 ${t.sub}`}>{result.detail}</div>}
                  </div>
                </div>
              )}
            </div>

            <div className="px-5 py-3 flex justify-end gap-2 border-t" style={{ borderColor: 'rgba(120,120,120,0.15)' }}>
              <button onClick={onClose} disabled={busy} className={`h-9 px-3 rounded-lg border text-sm disabled:opacity-40 ${t.chip} ${t.hover}`}>
                {result ? 'Close' : 'Cancel'}
              </button>
              <button onClick={onRun} disabled={busy}
                className="h-9 px-4 rounded-lg bg-gradient-to-br from-cyan-500 to-indigo-600 text-white text-sm font-medium flex items-center gap-2 disabled:opacity-60">
                {busy ? <Loader2 size={14} className="animate-spin" /> : <Download size={14} />}
                {result ? `Export ${format.toUpperCase()} again` : `Export ${format.toUpperCase()}`}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* =========================================================================
       EXPORT ENGINE
       -------------------------------------------------------------------------
       One authoritative serialiser (buildSVG) feeds three pipelines:
         SVG  → the serialised string, saved as-is (lossless vector)
         PDF  → svg2pdf/jsPDF, page size = poster size in mm (true vector)
         PNG/JPG → the SVG painted into a canvas scaled to the requested DPI
       Crop bug fix: the root <svg> now carries UNITLESS width/height that match
       the viewBox exactly. Emitting "841mm" made svg2pdf resolve the intrinsic
       size in CSS pixels (≈3178) while the page was 841 units wide, so the
       artwork was drawn ~3.78× too large and clipped at the page edge.
       ======================================================================= */

    const EXPORT_FORMATS = [
      { key: 'pdf', label: 'PDF',  hint: 'Print-ready vector · true 1:1 mm page', icon: FileText },
      { key: 'svg', label: 'SVG',  hint: 'Lossless vector · editable in Illustrator/Inkscape', icon: Spline },
      { key: 'png', label: 'PNG',  hint: 'Raster with transparency support', icon: ImagePlus },
      { key: 'jpg', label: 'JPG',  hint: 'Raster, smaller files · no transparency', icon: ImagePlus },
    ];
    const DPI_OPTIONS = [150, 300, 600];
    const MAX_CANVAS_SIDE = 16384;      // browser hard limit
    const MAX_CANVAS_PIXELS = 200e6;    // practical memory ceiling

    function rasterPlan(poster, dpi) {
      const want = { w: Math.round((poster.w / 25.4) * dpi), h: Math.round((poster.h / 25.4) * dpi) };
      let k = 1;
      k = Math.min(k, MAX_CANVAS_SIDE / Math.max(want.w, want.h));
      k = Math.min(k, Math.sqrt(MAX_CANVAS_PIXELS / (want.w * want.h)));
      if (k >= 1) return { w: want.w, h: want.h, dpi, clamped: false };
      return { w: Math.floor(want.w * k), h: Math.floor(want.h * k), dpi: Math.floor(dpi * k), clamped: true };
    }

    function downloadBlob(blob, name) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = name;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    }

    function exportSVGFile(svg, name) {
      downloadBlob(new Blob([svg], { type: 'image/svg+xml;charset=utf-8' }), `${name}.svg`);
      return { ok: true, detail: 'Vector SVG downloaded.' };
    }

    async function exportRaster(svg, poster, dpi, kind, name) {
      const plan = rasterPlan(poster, dpi);
      const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      try {
        const img = await new Promise((res, rej) => {
          const im = new Image();
          im.onload = () => res(im); im.onerror = () => rej(new Error('SVG rasterisation failed'));
          im.src = url;
        });
        const cv = document.createElement('canvas');
        cv.width = plan.w; cv.height = plan.h;
        const ctx = cv.getContext('2d');
        if (kind === 'jpg') { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, plan.w, plan.h); }
        ctx.drawImage(img, 0, 0, plan.w, plan.h);
        const out = await new Promise((res) => cv.toBlob(res, kind === 'jpg' ? 'image/jpeg' : 'image/png', 0.94));
        downloadBlob(out, `${name}.${kind === 'jpg' ? 'jpg' : 'png'}`);
        return { ok: true, detail: `${plan.w.toLocaleString()} × ${plan.h.toLocaleString()} px at ${plan.dpi} DPI.` +
          (plan.clamped ? ' Capped to the browser canvas limit — use PDF or SVG for full resolution.' : '') };
      } finally { URL.revokeObjectURL(url); }
    }

    async function exportPDFFile(svg, poster, name) {
      const jspdfMod = await import('https://esm.sh/jspdf@2.5.1');
      await import('https://esm.sh/svg2pdf.js@2.2.1');
      const jsPDF = jspdfMod.jsPDF || jspdfMod.default;
      const doc = new jsPDF({
        unit: 'mm',
        format: [poster.w, poster.h],
        orientation: poster.w > poster.h ? 'landscape' : 'portrait',
        compress: true,
      });
      const node = new DOMParser().parseFromString(svg, 'image/svg+xml').documentElement;
      // Mount off-screen: svg2pdf needs a laid-out node to resolve geometry.
      const holder = document.createElement('div');
      holder.style.cssText = 'position:fixed;left:-99999px;top:0;opacity:0;pointer-events:none';
      holder.appendChild(node); document.body.appendChild(holder);
      try {
        await doc.svg(node, { x: 0, y: 0, width: poster.w, height: poster.h });
        doc.save(`${name}.pdf`);
        return { ok: true, detail: `Vector PDF · ${poster.w} × ${poster.h} mm page, full bleed, no cropping.` };
      } finally { holder.remove(); }
    }

    /* Fallback when the PDF libraries can't be reached (offline / blocked CDN):
       a page-exact print document the user can "Save as PDF" from. Only ever
       reached after an explicit failure — never as the default path. */
    function exportPrintFallback(svg, poster, name) {
      const html = `<!doctype html><html><head><meta charset="utf-8"><title>${name}</title>
<style>@page{size:${poster.w}mm ${poster.h}mm;margin:0}html,body{margin:0;padding:0}svg{display:block;width:${poster.w}mm;height:${poster.h}mm}</style>
</head><body>${svg}<script>window.onload=function(){setTimeout(function(){window.print()},400)}<\/script></body></html>`;
      const url = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
      const win = window.open(url, '_blank');
      if (win) { setTimeout(() => URL.revokeObjectURL(url), 20000); return { ok: true, detail: 'PDF libraries unreachable — opened a page-exact print view instead. Choose “Save as PDF”, and set margins to None.' }; }
      downloadBlob(new Blob([html], { type: 'text/html' }), `${name}_print.html`);
      URL.revokeObjectURL(url);
      return { ok: true, detail: 'Popup blocked — downloaded a print-ready HTML file instead. Open it and print to PDF.' };
    }

    /* ---- SVG serialisation (mirrors the on-canvas renderers) ---- */
    function esc(s = '') { return String(s).replace(/[<>&"']/g, (c) => ({ '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;' }[c])); }

    /* Greedy wrap using an average-advance estimate. AVG_ADVANCE is the mean
       glyph width as a fraction of the em for common UI/serif faces. */
    const AVG_ADVANCE = 0.5;
    function wrapToWidth(text, fontSize, maxWidth, bold) {
      const per = fontSize * AVG_ADVANCE * (bold ? 1.06 : 1);
      const maxChars = Math.max(4, Math.floor(maxWidth / per));
      const out = [];
      for (const para of String(text ?? '').split('\n')) {
        if (!para.trim()) { out.push(''); continue; }
        let line = '';
        for (const w of para.split(/\s+/)) {
          if (line && (line + ' ' + w).length > maxChars) { out.push(line); line = w; }
          else line = line ? line + ' ' + w : w;
        }
        out.push(line);
      }
      return out;
    }

    function svgText(x, y, str, { size, family, weight = 400, fill, anchor = 'start' }) {
      return `<text x="${+x.toFixed(2)}" y="${+y.toFixed(2)}" font-family="${esc(family || 'sans-serif')}" font-size="${+size.toFixed(2)}" font-weight="${weight}" fill="${fill}" text-anchor="${anchor}" xml:space="preserve">${esc(str)}</text>`;
    }

    /* Emit one wrapped line as a <text> with a <tspan> per styled run. Because
       wrapping used real measured advances, x positioning for centre/right
       anchors is exact rather than estimated.                                  */
    function svgRichLine(x, y, runs, { anchor = 'start', family, defaultFill }) {
      if (!runs.length) return '';
      const spans = runs.map((r) => {
        const parts = [];
        const fam = r.family || family || 'sans-serif';
        parts.push(`font-family="${esc(fam)}"`);
        parts.push(`font-size="${+(r.sizeAbs || r.size).toFixed(2)}"`);
        parts.push(`font-weight="${r.bold ? 700 : 400}"`);
        if (r.italic) parts.push('font-style="italic"');
        const deco = [r.underline ? 'underline' : '', r.strike ? 'line-through' : ''].filter(Boolean).join(' ');
        if (deco) parts.push(`text-decoration="${deco}"`);
        parts.push(`fill="${r.color || defaultFill}"`);
        return `<tspan ${parts.join(' ')} xml:space="preserve">${esc(r.text)}</tspan>`;
      }).join('');
      return `<text x="${+x.toFixed(2)}" y="${+y.toFixed(2)}" text-anchor="${anchor}" xml:space="preserve">${spans}</text>`;
    }

    /* Lay out rich blocks into a box and push the SVG. Returns the y cursor. */
    function layoutRichBlocks(blocks, out, opts) {
      const { x, y0, width, lineHeight, align, family, fill, maxY, accent, size } = opts;
      const anchor = align === 'center' ? 'middle' : align === 'right' ? 'end' : 'start';
      let y = y0;
      for (const b of blocks) {
        const isList = !!b.list;
        const lst = isList ? (listByKey[b.list] || listByKey.disc) : null;
        const markerTxt = isList ? lst.marker(b.listIndex || 0) : '';
        const markerW = isList ? Math.max(measureText(markerTxt + ' ', { size, weight: 600, family }), size * (ORDERED_LISTS.has(b.list) ? 1.5 : 0.9)) + size * 0.25 : 0;
        const avail = width - markerW;
        const runs = b.runs.filter(r => r.text !== '');

        if (!runs.length) { y += lineHeight; continue; }

        const wrapped = wrapRuns(runs, avail);
        wrapped.forEach((lineRuns, li) => {
          if (y > maxY) return;
          if (isList && li === 0) {
            out.push(svgRichLine(x, y, [{ text: markerTxt, size, family, bold: true, color: accent || fill }],
                     { anchor: 'start', family, defaultFill: accent || fill }));
          }
          const lw = lineWidth(lineRuns);
          const tx = anchor === 'middle' ? x + markerW + avail / 2
                   : anchor === 'end'    ? x + markerW + avail
                   : x + markerW;
          out.push(svgRichLine(tx, y, lineRuns, { anchor, family, defaultFill: fill }));
          y += lineHeight;
        });
      }
      return y;
    }

    function serialiseSection(el, out, clipId) {
      const pad = el.padding ?? 10;
      const kind = el.sectionKind || 'plain';
      const hs = el.headerStyle || 'bar';
      const family = el.fontFamily || 'sans-serif';
      const rx = el.radius || 0;
      const inner = el.w - pad * 2;
      const baseStyle = { size: el.fontSize, family, color: el.color, bold: false, italic: false };
      const lh = el.fontSize * el.lineHeight;
      let cursor = 0;

      // Drop shadow, drawn as a real blurred rect so it survives into PDF/PNG.
      const shLv = shadowByKey[normShadow(el.shadow)];
      if (shLv && shLv.key !== 'none') {
        const fid = `sh_${clipId}`;
        out.push(`<defs><filter id="${fid}" x="-25%" y="-25%" width="150%" height="150%">`
          + `<feDropShadow dx="0" dy="${shLv.dy}" stdDeviation="${shLv.blur / 2}" flood-color="${el.shadowColor || '#0f172a'}" flood-opacity="${shLv.alpha}"/>`
          + `</filter></defs>`);
        out.push(`<rect x="0" y="0" width="${el.w}" height="${el.h}" rx="${rx}" ry="${rx}" fill="${el.fill}" filter="url(#${fid})"/>`);
      }

      out.push(`<rect x="0" y="0" width="${el.w}" height="${el.h}" rx="${rx}" ry="${rx}" fill="${el.fill}"/>`);
      if (el.borderW) out.push(`<rect x="${el.borderW / 2}" y="${el.borderW / 2}" width="${el.w - el.borderW}" height="${el.h - el.borderW}" rx="${rx}" ry="${rx}" fill="none" stroke="${el.borderColor || el.accent}" stroke-width="${el.borderW}"/>`);

      /* ---- Header (never for banner — the banner owns its own title) ---- */
      const hFs = Math.max(8, el.fontSize * 1.35);
      const tAlign = el.titleAlign || 'left';
      if (kind !== 'banner' && el.title && hs !== 'none') {
        const tw = measureText(el.title, { size: hFs, weight: 700, family });
        const tAnchor = tAlign === 'center' ? 'middle' : tAlign === 'right' ? 'end' : 'start';
        const tX = tAlign === 'center' ? el.w / 2 : tAlign === 'right' ? el.w - pad : pad;
        if (hs === 'bar') {
          const hh = hFs * 1.1 + pad * 1.1;
          out.push(`<rect x="0" y="0" width="${el.w}" height="${hh}" fill="${el.accent}"/>`);
          out.push(svgText(tX, hh / 2 + hFs * 0.36, el.title, { size: hFs, family, weight: 700, fill: '#ffffff', anchor: tAnchor }));
          cursor = hh;
        } else if (hs === 'tab') {
          const boxW = Math.min(tw + pad * 2, el.w - pad * 2);
          const th = hFs * 1.1 + pad * 0.7;
          const bx = tAlign === 'center' ? (el.w - boxW) / 2 : tAlign === 'right' ? el.w - pad - boxW : pad;
          out.push(`<rect x="${bx}" y="${pad * 0.5}" width="${boxW}" height="${th}" rx="${rx * 0.8}" fill="${el.accent}"/>`);
          out.push(svgText(bx + pad, pad * 0.5 + th / 2 + hFs * 0.36, el.title, { size: hFs, family, weight: 700, fill: '#ffffff' }));
          cursor = pad * 0.5 + th;
        } else if (hs === 'underline') {
          const baseY = pad * 0.6 + hFs;
          out.push(svgText(tX, baseY, el.title, { size: hFs, family, weight: 700, fill: el.accent, anchor: tAnchor }));
          const ly = baseY + pad * 0.35;
          out.push(`<line x1="${pad}" y1="${ly}" x2="${el.w - pad}" y2="${ly}" stroke="${el.accent}" stroke-width="${Math.max(0.4, hFs * 0.09)}"/>`);
          cursor = ly;
        } else {
          out.push(svgText(tX, pad * 0.6 + hFs, el.title, { size: hFs, family, weight: 700, fill: el.accent, anchor: tAnchor }));
          cursor = pad * 0.6 + hFs;
        }
      }

      const bodyTop = cursor + pad;
      const maxY = el.h - pad * 0.3;

      /* ---- Banner: title + authors, both centred, measured for real ---- */
      if (kind === 'banner') {
        const tFs = el.fontSize * 2.6;
        const titleBlocks = el.titleHtml != null
          ? htmlToBlocks(el.titleHtml, { ...baseStyle, size: tFs, color: el.color })
          : plainToBlocks(el.title, { ...baseStyle, size: tFs, color: el.color });
        const subSize = el.fontSize * 1.15;
        const subBlocks = elBlocks(el, { ...baseStyle, size: subSize, color: el.color });

        // Pre-wrap both halves so the whole stack can be vertically centred.
        const tLines = titleBlocks.flatMap(b => wrapRuns(b.runs.filter(r => r.text !== ''), inner));
        const sLines = subBlocks.flatMap(b => wrapRuns(b.runs.filter(r => r.text !== ''), inner));
        const tLH = tFs * 1.1, sLH = subSize * 1.35;
        const totalH = tLines.filter(l => l.length).length * tLH + sLines.filter(l => l.length).length * sLH + pad * 0.35;
        let y = Math.max(pad + tFs * 0.85, (el.h - totalH) / 2 + tFs * 0.85);

        tLines.forEach((lineRuns) => {
          if (!lineRuns.length || y > maxY) return;
          out.push(svgRichLine(el.w / 2, y, lineRuns, { anchor: 'middle', family, defaultFill: el.color }));
          y += tLH;
        });
        y += pad * 0.35;
        sLines.forEach((lineRuns) => {
          if (!lineRuns.length || y > maxY) return;
          out.push(svgRichLine(el.w / 2, y, lineRuns, { anchor: 'middle', family, defaultFill: el.color }));
          y += sLH;
        });
        return;
      }

      if (kind === 'callout') {
        const blocks = elBlocks(el, { ...baseStyle, bold: true });
        const all = blocks.flatMap(b => wrapRuns(b.runs.filter(r => r.text !== ''), inner));
        const totalH = all.filter(l => l.length).length * lh;
        let y = (el.h - totalH) / 2 + el.fontSize * 0.85;
        const anchor = el.align === 'center' ? 'middle' : el.align === 'right' ? 'end' : 'start';
        const cx = el.align === 'center' ? el.w / 2 : el.align === 'right' ? el.w - pad : pad;
        all.forEach((lineRuns) => {
          if (!lineRuns.length || y > maxY) return;
          out.push(svgRichLine(cx, y, lineRuns.map(r => ({ ...r, bold: true })), { anchor, family, defaultFill: el.color }));
          y += lh;
        });
        return;
      }

      if (kind === 'figure') {
        const capFs = el.fontSize * 0.92;
        const capBlocks = elBlocks(el, { ...baseStyle, size: capFs });
        const titleRun = el.title ? [{ text: el.title + '. ', size: capFs, family, bold: true, color: el.accent }] : [];
        if (capBlocks.length && titleRun.length) capBlocks[0] = { ...capBlocks[0], runs: [...titleRun, ...capBlocks[0].runs] };
        const capLines = capBlocks.flatMap(b => wrapRuns(b.runs.filter(r => r.text !== ''), inner));
        const capH = Math.max(1, capLines.filter(l => l.length).length) * capFs * el.lineHeight + pad * 0.5;
        const imgH = Math.max(0, el.h - bodyTop - capH - pad * 0.5);
        if (el.src) out.push(`<image x="${pad}" y="${bodyTop}" width="${inner}" height="${imgH}" preserveAspectRatio="${el.fit === 'cover' ? 'xMidYMid slice' : 'xMidYMid meet'}" href="${el.src}"/>`);
        else out.push(`<rect x="${pad}" y="${bodyTop}" width="${inner}" height="${imgH}" fill="rgba(100,116,139,0.10)" stroke="${el.accent}" stroke-width="0.4" stroke-dasharray="3 3"/>`);
        let y = bodyTop + imgH + pad * 0.5 + capFs;
        capLines.forEach((lineRuns) => {
          if (!lineRuns.length || y > maxY) return;
          out.push(svgRichLine(pad, y, lineRuns, { anchor: 'start', family, defaultFill: el.color }));
          y += capFs * el.lineHeight;
        });
        return;
      }

      if (kind === 'table') {
        const rows = el.rows || [];
        const cols = Math.max(1, ...rows.map(r => r.length));
        const cw = inner / cols;
        const rh = Math.min((el.h - bodyTop - pad) / Math.max(1, rows.length), el.fontSize * 2.2);
        rows.forEach((r, ri) => {
          const y = bodyTop + ri * rh;
          if (y + rh > el.h - pad * 0.2) return;
          if (ri === 0) out.push(`<rect x="${pad}" y="${y}" width="${inner}" height="${rh}" fill="${el.accent}"/>`);
          else if (ri % 2) out.push(`<rect x="${pad}" y="${y}" width="${inner}" height="${rh}" fill="rgba(100,116,139,0.07)"/>`);
          for (let ci = 0; ci < cols; ci++) {
            out.push(`<rect x="${pad + ci * cw}" y="${y}" width="${cw}" height="${rh}" fill="none" stroke="rgba(100,116,139,0.45)" stroke-width="0.3"/>`);
            out.push(svgText(pad + ci * cw + cw * 0.08, y + rh / 2 + el.fontSize * 0.35, String(r[ci] ?? ''),
              { size: el.fontSize, family, weight: ri === 0 ? 700 : 400, fill: ri === 0 ? '#ffffff' : el.color }));
          }
        });
        return;
      }

      /* ---- Default: rich body (paragraphs + inline lists) ---- */
      layoutRichBlocks(elBlocks(el, baseStyle), out, {
        x: pad, y0: bodyTop + el.fontSize * 0.85, width: inner, lineHeight: lh,
        align: el.align, family, fill: el.color, maxY, accent: el.accent, size: el.fontSize,
      });
    }

    function buildSVG(elements, byId, poster) {
      const body = [];
      const defs = [];
      let clipSeq = 0;

      for (const el of elements) {
        if (el.visible === false) continue;
        const op = el.opacity ?? 1;
        const opAttr = op < 1 ? ` opacity="${op}"` : '';

        if (el.type === 'connector') {
          const v = variantByKey[el.variant] || variantByKey.arrow;
          const { A, B } = resolveConnector(el, byId);
          const d = connectorPath(A, B, v.routing);
          const head = (id, kind) =>
            kind === 'triangle' ? `<marker id="${id}" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L8,3.5 L0,7 Z" fill="${el.stroke}"/></marker>`
          : kind === 'open'     ? `<marker id="${id}" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L8,3.5 L0,7" fill="none" stroke="${el.stroke}" stroke-width="1.4"/></marker>`
          : kind === 'dot'      ? `<marker id="${id}" markerWidth="10" markerHeight="10" refX="3.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><circle cx="3.5" cy="3.5" r="3" fill="${el.stroke}"/></marker>` : '';
          const sId = `s_${el.id}`, eId = `e_${el.id}`;
          if (v.startHead !== 'none') defs.push(head(sId, v.startHead));
          if (v.endHead !== 'none') defs.push(head(eId, v.endHead));
          body.push(`<path d="${d}" fill="none" stroke="${el.stroke}" stroke-width="${el.strokeWidth}" stroke-linecap="round" stroke-linejoin="round"${el.dashed ? ` stroke-dasharray="${el.strokeWidth * 3} ${el.strokeWidth * 2}"` : ''}${v.startHead !== 'none' ? ` marker-start="url(#${sId})"` : ''}${v.endHead !== 'none' ? ` marker-end="url(#${eId})"` : ''}${opAttr}/>`);
          continue;
        }

        if (el.type === 'path') {
          const cx = el.x + el.w / 2, cy = el.y + el.h / 2;
          const rot = el.rot ? ` transform="rotate(${el.rot} ${cx} ${cy})"` : '';
          body.push(`<polyline points="${el.points.map(q => `${+q.x.toFixed(2)},${+q.y.toFixed(2)}`).join(' ')}" fill="none" stroke="${el.stroke}" stroke-width="${el.strokeWidth}" stroke-linecap="round" stroke-linejoin="round"${rot}${opAttr}/>`);
          continue;
        }

        // Box elements share a local coordinate frame: translate to (x,y) and
        // rotate about the box centre, so children can be authored at origin.
        const rot = el.rot ? ` rotate(${el.rot} ${el.w / 2} ${el.h / 2})` : '';
        const out = [];

        if (el.type === 'section') {
          const clipId = `clip_${++clipSeq}`;
          defs.push(`<clipPath id="${clipId}"><rect x="0" y="0" width="${el.w}" height="${el.h}" rx="${el.radius || 0}" ry="${el.radius || 0}"/></clipPath>`);
          out.push(`<g clip-path="url(#${clipId})">`);
          serialiseSection(el, out, clipId);
          out.push(`</g>`);
        } else if (el.type === 'text') {
          const px = 8;
          const family = el.fontFamily || 'sans-serif';
          layoutRichBlocks(elBlocks(el, { size: el.fontSize, family, color: el.color, bold: !!el.bold, italic: !!el.italic }), out, {
            x: px, y0: el.fontSize * 0.85 + px, width: el.w - px * 2, lineHeight: el.fontSize * el.lineHeight,
            align: el.align, family, fill: el.color, maxY: el.h + el.fontSize, accent: el.color, size: el.fontSize,
          });
        } else if (el.type === 'image') {
          const clipId = `clip_${++clipSeq}`;
          defs.push(`<clipPath id="${clipId}"><rect x="0" y="0" width="${el.w}" height="${el.h}"/></clipPath>`);
          out.push(`<g clip-path="url(#${clipId})"><image x="${(el.imgX ?? el.x) - el.x}" y="${(el.imgY ?? el.y) - el.y}" width="${el.imgW ?? el.w}" height="${el.imgH ?? el.h}" preserveAspectRatio="none" href="${el.src}"/></g>`);
        } else if (el.type === 'shape') {
          const sw = el.strokeWidth || 0;
          const iw = Math.max(1, el.w - sw), ih = Math.max(1, el.h - sw);
          const d = shapePath(el.shape, iw, ih, el.cornerRadius || 0);
          const open = OPEN_SHAPES.has(el.shape) || el.fill === 'none';
          out.push(`<g transform="translate(${sw / 2} ${sw / 2})"><path d="${d}" fill="${open ? 'none' : el.fill}" stroke="${el.stroke}" stroke-width="${sw}" stroke-linejoin="${el.miter === false ? 'round' : 'miter'}" stroke-linecap="butt"${el.dashed ? ` stroke-dasharray="${sw * 3} ${sw * 2}"` : ''}/></g>`);
        }

        body.push(`<g transform="translate(${+el.x.toFixed(2)} ${+el.y.toFixed(2)})${rot}"${opAttr}>${out.join('')}</g>`);
      }

      // Unitless width/height matching the viewBox — the crop fix.
      return [
        `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${poster.w}" height="${poster.h}" viewBox="0 0 ${poster.w} ${poster.h}">`,
        defs.length ? `<defs>${defs.join('')}</defs>` : '',
        `<rect x="0" y="0" width="${poster.w}" height="${poster.h}" fill="#ffffff"/>`,
        body.join('\n'),
        `</svg>`,
      ].filter(Boolean).join('\n');
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<PosterettoStudio />);
  </script>
</body>
</html>
